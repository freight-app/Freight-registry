<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Freight Registry</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>

<nav>
  <a class="nav-logo" href="/">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
      <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
      <line x1="12" y1="22.08" x2="12" y2="12"/>
    </svg>
    Freight
  </a>
  <div class="nav-search">
    <input type="search" id="nav-q" placeholder="Search packages…" autocomplete="off">
  </div>
  <div class="nav-links">
    <a href="https://github.com/TiniTinyTerminator/Freight" target="_blank">Docs</a>
    <a href="https://github.com/TiniTinyTerminator/Freight-registry" target="_blank">GitHub</a>
    <a id="nav-auth" href="/login">Login</a>
  </div>
  <button class="nav-settings-btn" id="nav-settings" aria-label="Settings" title="Settings">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
  <button class="nav-hamburger" id="nav-hamburger" aria-label="Menu">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
</nav>

<!-- Hero (hidden when a search query is active) -->
<div id="hero" class="hero">
  <h1>The package registry for<br>C, C++, and friends</h1>
  <p>Find and publish libraries for C, C++, Fortran, CUDA, HIP, D, Ada, and more.</p>
  <div class="search-wrap">
    <input type="search" id="hero-q" placeholder="Search 10,000+ packages…" autocomplete="off">
    <button onclick="doSearch()">Search</button>
  </div>
</div>

<!-- Stats bar -->
<div id="stats-bar" class="stats-bar"></div>

<main>
  <!-- Keyword cloud (shown in no-query state) -->
  <div id="kw-cloud"></div>
  <!-- Filter bar (shown when search is active) -->
  <div id="filter-bar" class="filter-bar" style="display:none">
    <select class="sort-select" id="sort-select" title="Sort order">
      <option value="name">A–Z</option>
      <option value="downloads">Most downloaded</option>
      <option value="newest">Newest</option>
    </select>
  </div>
  <!-- Results area -->
  <div id="results"></div>
  <div id="pagination" class="pagination"></div>
</main>

<footer>
  <span>© 2026 Freight</span>
  <span>
    <a href="/health">Status</a> ·
    <a href="https://github.com/TiniTinyTerminator/Freight" target="_blank">Docs</a>
  </span>
</footer>

<script src="/app.js"></script>
<script>
'use strict';

const PAGE_SIZE = 20;
let currentPage    = 0;
let currentQuery   = '';
let currentSort    = 'name';
let totalResults   = 0;

// ── Initialise ──────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', async () => {
  // Wire up search inputs
  document.getElementById('hero-q').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  // Sort select wiring
  const sortSel = document.getElementById('sort-select');
  if (sortSel) {
    sortSel.addEventListener('change', () => {
      currentSort = sortSel.value;
      performSearch(currentQuery, 0);
    });
  }

  // Parse ?q= from URL
  const params = new URLSearchParams(location.search);
  const q = params.get('q') ?? '';
  if (q) {
    document.getElementById('hero-q').value = q;
    document.getElementById('nav-q').value  = q;
    showFilters();
    performSearch(q, 0);
    document.getElementById('hero').style.display = 'none';
  } else {
    // No query: show featured / recent packages
    showFilters();
    loadFeatured();
  }

  loadStats();
});

function showFilters() {
  document.getElementById('filter-bar').style.display = '';
}

// ── Search ─────────────────────────────────────────────────────────────────

function doSearch() {
  const q = (document.getElementById('hero-q').value
          || document.getElementById('nav-q').value || '').trim();
  if (!q) return;
  history.pushState({}, '', `/?q=${encodeURIComponent(q)}`);
  document.getElementById('hero').style.display = 'none';
  showFilters();
  performSearch(q, 0);
}

async function performSearch(q, offset) {
  currentQuery = q;
  currentPage  = Math.floor(offset / PAGE_SIZE);
  const el = document.getElementById('results');
  setLoading(el);
  document.getElementById('pagination').innerHTML = '';
  // Hide keyword cloud while searching
  document.getElementById('kw-cloud').innerHTML = '';
  try {
    const opts = { limit: PAGE_SIZE, offset, sort: currentSort };
    const data = await API.search(q, opts);
    totalResults = data.total ?? data.packages.length;
    renderPackageCards(data.packages, el);
    renderPagination();
  } catch (err) {
    setError(el, `Search error: ${err.message}`);
  }
}

function renderPagination() {
  const pages = Math.ceil(totalResults / PAGE_SIZE);
  if (pages <= 1) return;
  const el = document.getElementById('pagination');
  const prev = `<button class="page-btn" ${currentPage === 0 ? 'disabled' : ''}
    onclick="performSearch('${esc(currentQuery)}', ${(currentPage-1)*PAGE_SIZE})">← Prev</button>`;
  const next = `<button class="page-btn" ${currentPage >= pages-1 ? 'disabled' : ''}
    onclick="performSearch('${esc(currentQuery)}', ${(currentPage+1)*PAGE_SIZE})">Next →</button>`;
  const info = `<span class="page-btn" style="cursor:default">
    Page ${currentPage+1} of ${pages} (${totalResults} results)</span>`;
  el.innerHTML = prev + info + next;
}

// ── Featured packages (empty query → browse all) ───────────────────────────

async function loadFeatured() {
  const el    = document.getElementById('results');
  const kwEl  = document.getElementById('kw-cloud');
  setLoading(el);
  try {
    const opts = { limit: PAGE_SIZE, sort: currentSort };
    const [data, kwData] = await Promise.all([
      API.search('', opts),
      API.keywords(),
    ]);
    totalResults = data.total ?? 0;
    renderKeywordCloud(kwData?.keywords ?? [], kwEl);
    if (data.packages.length === 0) {
      el.innerHTML = `<div class="empty" style="padding-top:16px">
        No packages published yet. Be the first to
        <a href="https://github.com/TiniTinyTerminator/Freight" target="_blank">publish</a>!
      </div>`;
    } else {
      renderPackageCards(data.packages, el);
      renderPagination();
    }
  } catch (err) {
    setError(el, 'Could not load packages: ' + err.message);
  }
}

// ── Stats bar ──────────────────────────────────────────────────────────────

async function loadStats() {
  try {
    const [h, s] = await Promise.all([API.health(), API.stats()]);
    const bar  = document.getElementById('stats-bar');
    const pkgs = s?.packages ?? null;
    const dls  = s?.downloads ?? null;
    const ok   = h?.status === 'ok';
    bar.innerHTML = `
      ${pkgs != null ? `<div class="stat"><span class="stat-val">${fmtNum(pkgs)}</span><span class="stat-lbl">Packages</span></div>` : ''}
      ${dls  != null ? `<div class="stat"><span class="stat-val">${fmtNum(dls)}</span><span class="stat-lbl">Downloads</span></div>` : ''}
      <div class="stat">
        <span class="stat-val" style="font-size:1.4rem">${ok ? '✓' : '⚠'}</span>
        <span class="stat-lbl">Registry ${ok ? 'Online' : 'Degraded'}</span>
      </div>`;
  } catch {}
}

// ── Nav search override ───────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  const navInput = document.getElementById('nav-q');
  if (navInput) {
    navInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && navInput.value.trim()) {
        doSearch();
      }
    });
  }
});
</script>
</body>
</html>
