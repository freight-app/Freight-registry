<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docs — Freight Registry</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/highlight.min.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    /* ── Override highlight.js with TUI-matching One Dark palette ─────────── */
    .hljs { background: transparent !important; color: rgb(200,210,220); }
    .hljs-keyword, .hljs-selector-tag, .hljs-tag { color: rgb(198,120,221); }
    .hljs-string, .hljs-attr, .hljs-attribute  { color: rgb(152,195,121); }
    .hljs-number, .hljs-literal                { color: rgb(229,192,123); }
    .hljs-comment, .hljs-quote                 { color: rgb(92,99,112); font-style: italic; }
    .hljs-title, .hljs-name, .hljs-section     { color: rgb(97,175,239); }
    .hljs-type, .hljs-class .hljs-title        { color: rgb(229,192,123); }
    .hljs-built_in, .hljs-builtin-name         { color: rgb(86,182,194); }
    .hljs-operator, .hljs-punctuation          { color: rgb(180,180,200); }
    .hljs-variable, .hljs-template-variable    { color: rgb(200,220,200); }
    .hljs-params                               { color: rgb(180,180,180); }
    .hljs-meta                                 { color: rgb(130,170,130); }
    /* ── TUI color palette ─────────────────────────────────────────────────── */
    :root {
      --tui-pkg:     rgb(220,200,120);
      --tui-section: rgb(140,140,180);
      --tui-symbol:  rgb(200,220,200);
      --tui-brief:   rgb(180,180,180);
      --tui-border:  rgb(80,80,100);
      --tui-active:  rgb(120,160,220);
      --tui-hint:    rgb(100,100,100);
      --tui-kind:    rgb(130,170,130);
      --tui-bg:      rgb(13,14,20);
      --tui-surface: rgb(20,22,30);

      /* heading pill colors */
      --h1-fg: rgb(229,192,123); --h1-bg: rgb(50,44,18);
      --h2-fg: rgb(152,195,121); --h2-bg: rgb(24,44,20);
      --h3-fg: rgb(97,175,239);  --h3-bg: rgb(18,33,50);
      --h4-fg: rgb(198,120,221); --h4-bg: rgb(34,18,44);
    }

    /* ── Reset for docs layout ─────────────────────────────────────────────── */
    body {
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
      background: var(--tui-bg);
      color: rgb(200,210,220);
      margin: 0;
      padding: 0;
      flex-direction: column;
    }

    /* ── Two-column layout ─────────────────────────────────────────────────── */
    #docs-layout {
      display: flex;
      height: calc(100vh - 52px); /* subtract nav */
      overflow: hidden;
    }

    /* ── Sidebar ───────────────────────────────────────────────────────────── */
    #docs-sidebar {
      width: 280px;
      min-width: 220px;
      max-width: 340px;
      background: var(--tui-surface);
      border-right: 1px solid var(--tui-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    #sidebar-header {
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--tui-border);
      flex-shrink: 0;
    }

    #sidebar-pkg-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--tui-pkg);
      letter-spacing: 0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #sidebar-pkg-ver {
      font-size: 11px;
      color: var(--tui-hint);
      margin-top: 2px;
    }

    .sidebar-meta-row {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--tui-hint);
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-meta-row a {
      color: var(--tui-active);
      text-decoration: none;
    }
    .sidebar-meta-row a:hover { text-decoration: underline; }
    .sidebar-meta-label {
      color: var(--tui-hint);
      flex-shrink: 0;
    }
    .sidebar-owner-chip {
      background: rgba(130,170,130,0.12);
      border: 1px solid rgba(130,170,130,0.25);
      border-radius: 3px;
      padding: 0 5px;
      font-size: 10px;
      color: var(--tui-kind);
      white-space: nowrap;
    }
    #sidebar-back {
      font-size: 11px;
      margin-top: 6px;
    }
    #sidebar-back a {
      color: var(--tui-hint);
      text-decoration: none;
    }
    #sidebar-back a:hover { color: var(--tui-active); }

    #sidebar-search-wrap {
      padding: 8px 10px;
      border-bottom: 1px solid var(--tui-border);
      flex-shrink: 0;
    }

    #sidebar-search {
      width: 100%;
      box-sizing: border-box;
      background: var(--tui-bg);
      border: 1px solid var(--tui-border);
      border-radius: 3px;
      padding: 5px 9px;
      font-family: inherit;
      font-size: 12px;
      color: var(--tui-symbol);
      outline: none;
      transition: border-color .15s;
    }
    #sidebar-search::placeholder { color: var(--tui-hint); }
    #sidebar-search:focus { border-color: var(--tui-active); }

    #sidebar-tree {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0 20px;
    }

    .sidebar-section-hdr {
      font-size: 9.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--tui-section);
      padding: 10px 14px 4px;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .sidebar-section-hdr::before {
      content: '▾';
      font-size: 9px;
      color: var(--tui-hint);
      transition: transform .15s;
      display: inline-block;
      width: 10px;
    }
    .sidebar-section-hdr.collapsed::before {
      transform: rotate(-90deg);
    }

    .sidebar-section-body {
      overflow: hidden;
    }
    .sidebar-section-body.collapsed { display: none; }

    .sidebar-entry {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 14px 4px 22px;
      cursor: pointer;
      font-size: 12px;
      color: var(--tui-symbol);
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      border-left: 2px solid transparent;
      transition: background .1s, border-color .1s;
    }
    .sidebar-entry:hover {
      background: rgba(120,160,220,0.08);
    }
    .sidebar-entry.active {
      background: rgba(120,160,220,0.13);
      border-left-color: var(--tui-active);
      color: var(--tui-active);
    }
    .sidebar-entry-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-entry-kind {
      font-size: 9.5px;
      color: var(--tui-kind);
      flex-shrink: 0;
    }

    /* namespace / class group */
    .sidebar-group > .sidebar-entry {
      padding-left: 14px;
      font-weight: 600;
    }
    .sidebar-group-members {
      overflow: hidden;
    }
    .sidebar-group-members.collapsed { display: none; }
    .sidebar-group-members .sidebar-entry {
      padding-left: 30px;
      font-size: 11.5px;
      color: var(--tui-brief);
    }
    .sidebar-group-members .sidebar-entry:hover { color: var(--tui-symbol); }
    .sidebar-group-members .sidebar-entry.active { color: var(--tui-active); }
    .sidebar-group-toggle {
      font-size: 8px;
      color: var(--tui-hint);
      flex-shrink: 0;
      transition: transform .12s;
    }
    .sidebar-group.open .sidebar-group-toggle { transform: rotate(90deg); }

    /* ── Detail panel ──────────────────────────────────────────────────────── */
    #docs-detail {
      flex: 1;
      overflow-y: auto;
      padding: 28px 36px 60px;
      min-width: 0;
    }

    /* ── Symbol header ─────────────────────────────────────────────────────── */
    .detail-sym-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--tui-symbol);
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin: 0 0 4px;
    }
    .detail-kind-badge {
      font-size: 13px;
      font-weight: 400;
      color: var(--tui-kind);
    }
    .detail-brief {
      font-size: 13px;
      color: var(--tui-brief);
      margin: 4px 0 18px;
      line-height: 1.6;
    }

    /* ── Heading pills ─────────────────────────────────────────────────────── */
    .detail-body h1 {
      color: var(--h1-fg);
      background: var(--h1-bg);
      border-left: 3px solid var(--h1-fg);
      padding: 3px 14px;
      border-radius: 4px;
      display: inline-block;
      font-size: 15px;
      margin: 22px 0 10px;
    }
    .detail-body h2 {
      color: var(--h2-fg);
      background: var(--h2-bg);
      border-left: 3px solid var(--h2-fg);
      padding: 2px 12px;
      border-radius: 4px;
      display: inline-block;
      font-size: 13.5px;
      margin: 18px 0 8px;
    }
    .detail-body h3 {
      color: var(--h3-fg);
      background: var(--h3-bg);
      border-left: 3px solid var(--h3-fg);
      padding: 2px 10px;
      border-radius: 4px;
      display: inline-block;
      font-size: 12.5px;
      margin: 14px 0 6px;
    }
    .detail-body h4, .detail-body h5, .detail-body h6 {
      color: var(--h4-fg);
      background: var(--h4-bg);
      border-left: 3px solid var(--h4-fg);
      padding: 2px 10px;
      border-radius: 4px;
      display: inline-block;
      font-size: 12px;
      margin: 12px 0 6px;
    }

    .detail-body p {
      font-size: 13px;
      line-height: 1.7;
      color: rgb(200,210,220);
      margin: 8px 0;
    }

    .detail-body a {
      color: var(--tui-active);
      text-decoration: none;
    }
    .detail-body a:hover { text-decoration: underline; }

    .detail-body ul, .detail-body ol {
      font-size: 13px;
      line-height: 1.7;
      padding-left: 20px;
      color: rgb(200,210,220);
    }

    /* ── Code blocks ───────────────────────────────────────────────────────── */
    .code-block-wrap {
      margin: 12px 0;
    }
    .code-block-header {
      font-family: inherit;
      font-size: 11px;
      color: var(--tui-border);
      background: transparent;
      padding: 0 0 1px 2px;
      letter-spacing: 0.03em;
      user-select: none;
    }
    .detail-body pre, pre.tui-pre {
      background: rgb(15,17,24);
      border: 1px solid var(--tui-border);
      border-radius: 4px;
      padding: 12px 16px;
      overflow-x: auto;
      margin: 0;
      font-family: inherit;
      font-size: 12.5px;
      line-height: 1.6;
    }
    .detail-body pre code {
      background: transparent;
      padding: 0;
      font-size: inherit;
    }
    .detail-body code {
      background: rgb(22,24,33);
      border: 1px solid rgba(80,80,100,0.5);
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 12px;
      color: var(--tui-symbol);
      font-family: inherit;
    }

    /* ── Parameter / member table ──────────────────────────────────────────── */
    .param-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12.5px;
      margin: 10px 0 18px;
    }
    .param-table th {
      text-align: left;
      color: var(--tui-section);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 5px 10px;
      border-bottom: 1px solid var(--tui-border);
      font-weight: 600;
    }
    .param-table td {
      padding: 5px 10px;
      vertical-align: top;
      border-bottom: 1px solid rgba(80,80,100,0.3);
      color: rgb(200,210,220);
    }
    .param-table tr:last-child td { border-bottom: none; }
    .param-table .col-name {
      font-weight: 600;
      color: var(--tui-symbol);
      white-space: nowrap;
    }
    .param-table .col-type {
      color: var(--tui-kind);
      white-space: nowrap;
    }
    .param-table .col-desc { color: var(--tui-brief); }

    /* ── Section divider ───────────────────────────────────────────────────── */
    .detail-divider {
      border: none;
      border-top: 1px solid var(--tui-border);
      margin: 20px 0 16px;
    }
    .detail-section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--tui-section);
      margin: 16px 0 6px;
      font-weight: 700;
    }

    /* ── Returns / See also ────────────────────────────────────────────────── */
    .detail-returns {
      font-size: 12.5px;
      color: rgb(200,210,220);
      margin: 4px 0 14px;
      line-height: 1.6;
    }
    .see-also-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 4px 0 14px;
    }
    .see-also-link {
      color: var(--tui-active);
      font-size: 12px;
      text-decoration: none;
      border: 1px solid rgba(120,160,220,0.3);
      border-radius: 3px;
      padding: 2px 8px;
    }
    .see-also-link:hover {
      text-decoration: underline;
      border-color: var(--tui-active);
    }

    /* ── Index overview ────────────────────────────────────────────────────── */
    .overview-counts {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 18px 0 24px;
    }
    .count-card {
      background: var(--tui-surface);
      border: 1px solid var(--tui-border);
      border-radius: 4px;
      padding: 10px 18px;
      text-align: center;
      min-width: 80px;
    }
    .count-card-num {
      font-size: 22px;
      font-weight: 700;
      color: var(--tui-pkg);
      display: block;
    }
    .count-card-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--tui-hint);
      display: block;
      margin-top: 2px;
    }

    /* ── "Browse locally" callout ──────────────────────────────────────────── */
    .local-card {
      background: var(--tui-surface);
      border: 1px solid var(--tui-border);
      border-left: 3px solid var(--tui-active);
      border-radius: 4px;
      padding: 14px 18px;
      margin: 0 0 22px;
      font-size: 12.5px;
    }
    .local-card-title {
      font-weight: 700;
      color: var(--tui-symbol);
      margin: 0 0 6px;
      font-size: 13px;
    }
    .local-card-desc {
      color: var(--tui-brief);
      line-height: 1.6;
      margin: 0 0 10px;
    }
    .local-card-cmd {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--tui-bg);
      border: 1px solid var(--tui-border);
      border-radius: 3px;
      padding: 7px 12px;
    }
    .local-card-cmd span {
      flex: 1;
      color: var(--tui-symbol);
      font-size: 12.5px;
      user-select: all;
    }
    .copy-btn {
      background: none;
      border: 1px solid var(--tui-border);
      border-radius: 3px;
      color: var(--tui-hint);
      cursor: pointer;
      font-size: 10px;
      padding: 2px 7px;
      font-family: inherit;
      transition: color .12s, border-color .12s;
    }
    .copy-btn:hover { color: var(--tui-active); border-color: var(--tui-active); }

    /* ── No docs state ─────────────────────────────────────────────────────── */
    .no-docs-msg {
      font-size: 13px;
      color: var(--tui-hint);
      margin: 20px 0;
      line-height: 1.7;
    }

    /* ── Loading / error ───────────────────────────────────────────────────── */
    .docs-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--tui-hint);
      font-size: 13px;
      gap: 10px;
    }
    .docs-error {
      color: #e06c75;
      font-size: 13px;
      margin: 24px 0;
      background: rgba(224,108,117,0.08);
      border: 1px solid rgba(224,108,117,0.3);
      border-radius: 4px;
      padding: 12px 16px;
    }

    /* ── Resize handle ─────────────────────────────────────────────────────── */
    #sidebar-resize {
      width: 4px;
      cursor: col-resize;
      background: transparent;
      flex-shrink: 0;
      transition: background .15s;
    }
    #sidebar-resize:hover { background: var(--tui-active); }

    /* ── Mobile ────────────────────────────────────────────────────────────── */
    @media (max-width: 700px) {
      #docs-sidebar { display: none; }
      #docs-detail  { padding: 20px 16px 50px; }
    }
  </style>
</head>

<script src="/highlight.min.js"></script>
<script>
'use strict';

/* Map fence lang tags → highlight.js language names */
const HLJS_LANG = {
  c:'c', cpp:'cpp', 'c++':'cpp', cc:'cpp', cxx:'cpp',
  rust:'rust', rs:'rust',
  python:'python', py:'python',
  js:'javascript', javascript:'javascript',
  ts:'typescript', typescript:'typescript',
  go:'go', java:'java', kotlin:'kotlin', swift:'swift',
  fortran:'fortran', f90:'fortran', f95:'fortran',
  d:'d', ada:'ada', zig:'zig',
  bash:'bash', sh:'bash', shell:'bash',
  toml:'toml', yaml:'yaml', json:'json', xml:'xml',
  cmake:'cmake', makefile:'makefile',
};

function hlCode(code, lang) {
  if (typeof hljs === 'undefined') return esc(code);
  const l = HLJS_LANG[lang?.toLowerCase()] ?? null;
  try {
    return l
      ? hljs.highlight(code, { language: l, ignoreIllegals: true }).value
      : hljs.highlightAuto(code, Object.values(HLJS_LANG)).value;
  } catch { return esc(code); }
}

/* ── Globals ────────────────────────────────────────────────────────────────── */
const pathParts = location.pathname.split('/').filter(Boolean);
const pkgName   = pathParts[1] ?? '';
document.title  = `${pkgName} — Docs`;

const KIND_LABEL = {
  fn: 'fn', sub: 'sub', macro: 'macro',
  struct: 'struct', class: 'class', enum: 'enum',
  type: 'type', iface: 'interface', var: 'var',
  mod: 'namespace', item: 'item', namespace: 'namespace',
  method: 'method', field: 'field', ctor: 'ctor',
};

const TYPE_KINDS      = new Set(['class','struct','iface','enum','type']);
const FN_KINDS        = new Set(['fn','sub','macro','method','ctor']);
const NAMESPACE_KINDS = new Set(['mod','namespace']);

let docsData  = null;  /* full JSON from /docs endpoint */
let pkgInfo   = null;  /* package metadata */
let allItems  = [];    /* flat list of doc items */

/* ── Helpers ────────────────────────────────────────────────────────────────── */

function kindLabel(k) { return KIND_LABEL[k] ?? k; }

function slug(name) {
  return name.replace(/[^a-zA-Z0-9_:.-]/g, '_');
}

function shortName(q) {
  const p = q.split(/::|\./);
  return p[p.length - 1] ?? q;
}

function kindBadge(kind) {
  return `<span class="sidebar-entry-kind">[${esc(kindLabel(kind))}]</span>`;
}

function detailKindBadge(kind) {
  return `<span class="detail-kind-badge">[${esc(kindLabel(kind))}]</span>`;
}

/* Very small markdown-to-HTML converter (headings, bold, inline-code, fences, paragraphs) */
function renderMarkdown(md) {
  if (!md) return '';
  const lines = md.split('\n');
  const out = [];
  let inFence = false, fenceLang = '', fenceLines = [];

  function flushFence() {
    const lang = fenceLang || '';
    const dashes = '─'.repeat(Math.max(2, 30 - lang.length));
    const header = lang
      ? `<div class="code-block-header">─── ${esc(lang)} ${dashes}</div>`
      : `<div class="code-block-header">─────────────────────────────────</div>`;
    const highlighted = hlCode(fenceLines.join('\n'), lang);
    out.push(`<div class="code-block-wrap">${header}<pre><code>${highlighted}</code></pre></div>`);
    fenceLines = [];
    fenceLang = '';
    inFence = false;
  }

  function inlineFormat(line) {
    return line
      .replace(/`([^`]+)`/g, (_, c) => `<code>${esc(c)}</code>`)
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/\*([^*]+)\*/g, '<em>$1</em>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, text, href) =>
        `<a href="${esc(href)}">${esc(text)}</a>`);
  }

  let pBuf = [];
  function flushP() {
    if (pBuf.length) {
      out.push(`<p>${pBuf.map(inlineFormat).join(' ')}</p>`);
      pBuf = [];
    }
  }

  for (const raw of lines) {
    if (inFence) {
      if (raw.startsWith('```') || raw.startsWith('~~~')) { flushP(); flushFence(); }
      else fenceLines.push(raw);
      continue;
    }
    const m = raw.match(/^(```|~~~)(\w*)/);
    if (m) { flushP(); inFence = true; fenceLang = m[2] || ''; continue; }

    const hm = raw.match(/^(#{1,6})\s+(.*)/);
    if (hm) {
      flushP();
      const lvl = hm[1].length;
      const tag = `h${Math.min(lvl, 6)}`;
      out.push(`<${tag}>${inlineFormat(hm[2])}</${tag}>`);
      continue;
    }

    const lm = raw.match(/^(\s*[-*+]|\s*\d+\.)\s+(.*)/);
    if (lm) { flushP(); out.push(`<li>${inlineFormat(lm[2])}</li>`); continue; }

    if (raw.trim() === '') { flushP(); continue; }
    pBuf.push(raw);
  }
  flushP();
  if (inFence) flushFence();

  return out.join('\n');
}

/* ── Sidebar building ───────────────────────────────────────────────────────── */

function buildSidebar(items, filter) {
  const q = (filter ?? '').toLowerCase();
  const tree = document.getElementById('sidebar-tree');
  if (!items.length) {
    tree.innerHTML = '<div style="padding:14px;font-size:12px;color:var(--tui-hint);">No symbols.</div>';
    return;
  }

  const filtered = q ? items.filter(it => it.name?.toLowerCase().includes(q)) : items;

  /* group by kind-category */
  const groups = {
    'Classes & Types': filtered.filter(i => TYPE_KINDS.has(i.kind)),
    'Namespaces':      filtered.filter(i => NAMESPACE_KINDS.has(i.kind)),
    'Functions':       filtered.filter(i => FN_KINDS.has(i.kind)),
    'Variables':       filtered.filter(i => i.kind === 'var'),
    'Other':           filtered.filter(i =>
      !TYPE_KINDS.has(i.kind) && !NAMESPACE_KINDS.has(i.kind) &&
      !FN_KINDS.has(i.kind) && i.kind !== 'var'
    ),
  };

  const currentHash = location.hash.slice(1);
  let html = '';

  /* index link */
  html += `<a class="sidebar-entry${currentHash === 'index' || !currentHash ? ' active' : ''}" data-hash="index">
    <span class="sidebar-entry-name">Overview</span>
  </a>`;

  for (const [title, members] of Object.entries(groups)) {
    if (!members.length) continue;
    const sorted = [...members].sort((a, b) => shortName(a.name).localeCompare(shortName(b.name)));
    html += `
      <div class="sidebar-section-hdr" data-section="${esc(title)}">${esc(title)}</div>
      <div class="sidebar-section-body" data-section-body="${esc(title)}">`;

    for (const it of sorted) {
      const s = slug(it.name);
      const active = currentHash === s ? ' active' : '';
      /* Check for members (class/namespace with sub-items) */
      const children = items.filter(c => {
        const parent = c.name.includes('::') ? c.name.slice(0, c.name.lastIndexOf('::')) : null;
        return parent === it.name;
      });

      if (children.length && (TYPE_KINDS.has(it.kind) || NAMESPACE_KINDS.has(it.kind))) {
        html += `<div class="sidebar-group">
          <a class="sidebar-entry${active}" data-hash="${esc(s)}">
            <span class="sidebar-group-toggle">▶</span>
            <span class="sidebar-entry-name">${esc(shortName(it.name))}</span>
            ${kindBadge(it.kind)}
          </a>
          <div class="sidebar-group-members collapsed">`;
        for (const child of children.sort((a, b) => shortName(a.name).localeCompare(shortName(b.name)))) {
          const cs = slug(child.name);
          const ca = currentHash === cs ? ' active' : '';
          html += `<a class="sidebar-entry${ca}" data-hash="${esc(cs)}">
            <span class="sidebar-entry-name">${esc(shortName(child.name))}</span>
            ${kindBadge(child.kind)}
          </a>`;
        }
        html += `</div></div>`;
      } else {
        html += `<a class="sidebar-entry${active}" data-hash="${esc(s)}">
          <span class="sidebar-entry-name">${esc(shortName(it.name))}</span>
          ${kindBadge(it.kind)}
        </a>`;
      }
    }
    html += `</div>`;
  }

  tree.innerHTML = html;

  /* Click handlers */
  tree.querySelectorAll('.sidebar-entry[data-hash]').forEach(el => {
    el.addEventListener('click', e => {
      e.preventDefault();
      const h = el.dataset.hash;
      navigateTo(h);
      /* expand group if member clicked */
      const gm = el.closest('.sidebar-group-members');
      if (gm) gm.classList.remove('collapsed');
    });
  });

  /* Section collapse */
  tree.querySelectorAll('.sidebar-section-hdr').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.dataset.section;
      const body = tree.querySelector(`[data-section-body="${key}"]`);
      el.classList.toggle('collapsed');
      if (body) body.classList.toggle('collapsed');
    });
  });

  /* Group expand */
  tree.querySelectorAll('.sidebar-group > .sidebar-entry').forEach(el => {
    el.addEventListener('click', e => {
      const group = el.closest('.sidebar-group');
      const members = group?.querySelector('.sidebar-group-members');
      if (members) {
        members.classList.toggle('collapsed');
        group.classList.toggle('open');
      }
    });
  });
}

/* ── Detail rendering ───────────────────────────────────────────────────────── */

function renderIndex() {
  const detail = document.getElementById('docs-detail');
  const pkg = pkgInfo;
  const items = allItems;

  const counts = {
    types: items.filter(i => TYPE_KINDS.has(i.kind)).length,
    fns:   items.filter(i => FN_KINDS.has(i.kind)).length,
    vars:  items.filter(i => i.kind === 'var').length,
    ns:    items.filter(i => NAMESPACE_KINDS.has(i.kind)).length,
  };

  const cmdText = `freight doc ${pkgName}`;
  let html = '';

  /* Package header */
  if (pkg) {
    html += `<div style="margin-bottom:20px">
      <div style="font-size:22px;font-weight:700;color:var(--tui-pkg);margin-bottom:4px">
        ${esc(pkg.name)}<span style="font-size:14px;font-weight:400;color:var(--tui-hint);margin-left:10px">v${esc(pkg.latest ?? '')}</span>
      </div>
      <div style="font-size:12px;color:var(--tui-hint)">
        <a href="/packages/${esc(pkg.name)}" style="color:var(--tui-hint);text-decoration:none">← Back to package</a>
      </div>
    </div>`;
  }

  /* TUI callout */
  html += `<div class="local-card">
    <div class="local-card-title">Interactive Documentation</div>
    <p class="local-card-desc">The best experience is the <code>${esc('freight doc')}</code> TUI browser —
    syntax highlighting, cross-references, and full-text search directly from source.</p>
    <div class="local-card-cmd">
      <span id="cmd-text">${esc(cmdText)}</span>
      <button class="copy-btn" id="copy-btn">Copy</button>
    </div>
  </div>`;

  if (!items.length) {
    html += `<p class="no-docs-msg">No symbol index uploaded. Run <code>freight doc ${esc(pkgName)}</code> locally to browse the source.</p>`;
    detail.innerHTML = html;
    wireLocalCard(cmdText);
    return;
  }

  /* Count cards */
  html += `<div class="overview-counts">`;
  if (counts.types)  html += countCard(counts.types, 'Types');
  if (counts.fns)    html += countCard(counts.fns, 'Functions');
  if (counts.vars)   html += countCard(counts.vars, 'Variables');
  if (counts.ns)     html += countCard(counts.ns, 'Namespaces');
  html += `</div>`;

  /* README if present */
  const readme = docsData?.readme;
  if (readme) {
    html += `<div class="detail-section-label">Readme</div>`;
    html += `<div class="detail-body">${renderMarkdown(readme)}</div>`;
  }

  detail.innerHTML = html;
  wireLocalCard(cmdText);
  markSidebarActive('index');
}

function countCard(n, label) {
  return `<div class="count-card"><span class="count-card-num">${n}</span><span class="count-card-label">${esc(label)}</span></div>`;
}

function wireLocalCard(cmdText) {
  const btn = document.getElementById('copy-btn');
  if (btn) {
    btn.addEventListener('click', () => {
      navigator.clipboard.writeText(cmdText).then(() => {
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy'; }, 1800);
      }).catch(() => {});
    });
  }
}

function renderSymbol(item) {
  const detail = document.getElementById('docs-detail');
  let html = '';

  /* Symbol header */
  html += `<div class="detail-sym-name">
    ${esc(item.name)}
    ${detailKindBadge(item.kind)}
  </div>`;

  if (item.brief) {
    html += `<div class="detail-brief">${esc(item.brief)}</div>`;
  }

  /* Signature / prototype */
  if (item.signature || item.proto) {
    const sig = item.signature ?? item.proto;
    const lang = item.language ?? item.lang ?? 'cpp';
    const dashes = '─'.repeat(Math.max(2, 30 - lang.length));
    html += `<div class="code-block-wrap">
      <div class="code-block-header">─── ${esc(lang)} ${dashes}</div>
      <pre><code>${hlCode(sig, lang)}</code></pre>
    </div>`;
  }

  /* Body markdown */
  if (item.body || item.doc) {
    html += `<hr class="detail-divider">`;
    html += `<div class="detail-body">${renderMarkdown(item.body ?? item.doc)}</div>`;
  }

  /* Parameters */
  const params = item.params ?? item.parameters ?? [];
  if (params.length) {
    html += `<hr class="detail-divider">`;
    html += `<div class="detail-section-label">Parameters</div>`;
    html += `<table class="param-table">
      <thead><tr><th>Name</th><th>Type</th><th>Description</th></tr></thead><tbody>`;
    for (const p of params) {
      html += `<tr>
        <td class="col-name">${esc(p.name ?? '')}</td>
        <td class="col-type">${esc(p.type ?? p.kind ?? '')}</td>
        <td class="col-desc">${esc(p.desc ?? p.brief ?? p.description ?? '')}</td>
      </tr>`;
    }
    html += `</tbody></table>`;
  }

  /* Returns */
  if (item.returns || item.return_type) {
    html += `<hr class="detail-divider">`;
    html += `<div class="detail-section-label">Returns</div>`;
    const retText = typeof item.returns === 'string' ? item.returns : (item.return_type ?? '');
    html += `<div class="detail-returns">${esc(retText)}</div>`;
  }

  /* Members (class/struct) */
  const members = allItems.filter(c => {
    const parent = c.name.includes('::') ? c.name.slice(0, c.name.lastIndexOf('::')) : null;
    return parent === item.name;
  });
  if (members.length) {
    html += `<hr class="detail-divider">`;
    html += `<div class="detail-section-label">Members</div>`;
    html += `<table class="param-table">
      <thead><tr><th>Name</th><th>Kind</th><th>Description</th></tr></thead><tbody>`;
    for (const m of members.sort((a, b) => shortName(a.name).localeCompare(shortName(b.name)))) {
      html += `<tr>
        <td class="col-name"><a class="see-also-link" href="#${esc(slug(m.name))}" style="border:none;padding:0">${esc(shortName(m.name))}</a></td>
        <td class="col-type">[${esc(kindLabel(m.kind))}]</td>
        <td class="col-desc">${esc(m.brief ?? '')}</td>
      </tr>`;
    }
    html += `</tbody></table>`;
  }

  /* See also */
  const seeAlso = item.see_also ?? item.see ?? [];
  if (seeAlso.length) {
    html += `<hr class="detail-divider">`;
    html += `<div class="detail-section-label">See Also</div>`;
    html += `<div class="see-also-list">`;
    for (const ref of seeAlso) {
      const name = typeof ref === 'string' ? ref : (ref.name ?? String(ref));
      html += `<a class="see-also-link" href="#${esc(slug(name))}">${esc(name)}</a>`;
    }
    html += `</div>`;
  }

  detail.innerHTML = html;

  /* Wire see-also / member links */
  detail.querySelectorAll('a[href^="#"]').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      navigateTo(a.getAttribute('href').slice(1));
    });
  });

  markSidebarActive(slug(item.name));
}

function renderNotFound(hash) {
  const detail = document.getElementById('docs-detail');
  detail.innerHTML = `<p class="no-docs-msg">Symbol <code>${esc(hash)}</code> not found.</p>`;
}

/* ── Routing ────────────────────────────────────────────────────────────────── */

function navigateTo(hash) {
  history.pushState(null, '', `#${hash}`);
  route(hash);
}

function route(hash) {
  if (!hash || hash === 'index') {
    renderIndex();
    return;
  }
  /* find item by slug */
  const item = allItems.find(i => slug(i.name) === hash);
  if (item) {
    renderSymbol(item);
  } else {
    renderNotFound(hash);
  }
}

function markSidebarActive(hash) {
  document.querySelectorAll('.sidebar-entry').forEach(el => {
    el.classList.toggle('active', el.dataset.hash === hash);
  });
}

/* ── Sidebar resize ─────────────────────────────────────────────────────────── */

(function() {
  const handle = document.getElementById('sidebar-resize');
  const sidebar = document.getElementById('docs-sidebar');
  let dragging = false, startX = 0, startW = 0;

  handle.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startW = sidebar.offsetWidth;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const w = Math.max(160, Math.min(480, startW + e.clientX - startX));
    sidebar.style.width = `${w}px`;
  });
  document.addEventListener('mouseup', () => {
    dragging = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

/* ── Main ───────────────────────────────────────────────────────────────────── */

document.addEventListener('DOMContentLoaded', async () => {
  /* Sidebar search filter */
  document.getElementById('sidebar-search').addEventListener('input', e => {
    buildSidebar(allItems, e.target.value);
  });

  /* Hash routing */
  window.addEventListener('popstate', () => {
    route(location.hash.slice(1));
  });

  try {
    const [pkg, docsResp, ownersResp] = await Promise.all([
      API.getPackage(pkgName),
      fetch(`/api/v1/packages/${encodeURIComponent(pkgName)}/latest/docs`),
      API.getOwners(pkgName),
    ]);
    pkgInfo = pkg;

    /* Update sidebar header */
    if (pkg) {
      document.getElementById('sidebar-pkg-name').textContent = pkg.name;
      document.getElementById('sidebar-pkg-ver').textContent  = `v${pkg.latest ?? ''}`;

      /* Source link — derive from upstream_url if present */
      const src = repoUrl(pkg.upstream_url ?? pkg.url ?? '');
      if (src) {
        const label = repoLabel(src);
        document.getElementById('sidebar-source').innerHTML =
          `<div class="sidebar-meta-row">
             <span class="sidebar-meta-label">source</span>
             <a href="${esc(src)}" target="_blank" rel="noopener">${esc(label)} ↗</a>
           </div>`;
      }

      /* Owners */
      const owners = ownersResp?.users ?? ownersResp?.owners ?? [];
      if (owners.length) {
        const chips = owners.map(o => {
          const name = typeof o === 'string' ? o : (o.username ?? o.name ?? String(o));
          return `<a href="/users/${esc(name)}" class="sidebar-owner-chip">${esc(name)}</a>`;
        }).join('');
        document.getElementById('sidebar-owners').innerHTML =
          `<div class="sidebar-meta-row" style="flex-wrap:wrap;gap:4px;margin-top:5px">${chips}</div>`;
      }

      document.getElementById('sidebar-back').innerHTML =
        `<a href="/packages/${esc(pkg.name)}">← back to package</a>`;
    } else {
      document.getElementById('sidebar-pkg-name').textContent = pkgName;
    }

    /* Fetch docs */
    if (docsResp.ok) {
      docsData = await docsResp.json();
    } else if (pkg?.latest) {
      const r2 = await fetch(`/api/v1/packages/${encodeURIComponent(pkgName)}/${encodeURIComponent(pkg.latest)}/docs`);
      if (r2.ok) docsData = await r2.json();
    }

    allItems = (docsData?.items ?? []).filter(i => i.name);

    /* Build sidebar */
    buildSidebar(allItems, '');

    /* Initial route */
    route(location.hash.slice(1));

  } catch (err) {
    document.getElementById('sidebar-pkg-name').textContent = pkgName;
    document.getElementById('docs-detail').innerHTML =
      `<div class="docs-error">Failed to load documentation: ${esc(String(err.message ?? err))}</div>
       <p class="no-docs-msg">Try running <code>freight doc ${esc(pkgName)}</code> locally.</p>`;
  }
});
</script>
</body>
</html>
