<body>

<main id="main">
  <div class="loading"><div class="spinner"></div></div>
</main>

<footer>
  <span>© 2026 Freight</span>

    <a href="/health">Status</a> ·
    <a href="https://github.com/TiniTinyTerminator/Freight" target="_blank">Docs</a>
  </span>

<script src="/app.js"></script>
<script>
'use strict';

// ── Bootstrap ───────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', async () => {
  // Extract package name from path: /packages/:name
  const parts = location.pathname.split('/').filter(Boolean);
  const name  = parts[1];   // ["packages", "libssl"] → "libssl"
  if (!name) {
    document.getElementById('main').innerHTML =
      '<div class="error">No package name in URL.</div>';
    return;
  }

  const params  = new URLSearchParams(location.search);
  const channel = params.get('channel') ?? undefined;
  const version = params.get('version') ?? undefined;
  document.title = `${name} — Freight Registry`;

  await loadPackage(name, channel, version);
});

// ── Load & render ───────────────────────────────────────────────────────────

async function loadPackage(name, channel, selectedVersion) {
  const main = document.getElementById('main');
  try {
    const [pkg, owners] = await Promise.all([
      API.getPackage(name, channel),
      API.getOwners(name),
    ]);

    if (!pkg) {
      main.innerHTML = `
        <div class="error" style="margin-top:48px">
          <h2>Package not found</h2>
          <p>No package named <strong>${esc(name)}</strong> exists on this registry.</p>
          <p><a href="/">← Back to search</a></p>
        </div>`;
      return;
    }

    // Pick displayed version: URL ?version= param → server-authoritative latest
    const activeVer = (pkg.versions ?? []).find(v =>
      v.version === (selectedVersion ?? pkg.latest)
    ) ?? pkg.versions?.[0] ?? {};
    const latest    = activeVer;   // "latest" alias kept for template compat
    const deps      = (latest.dependencies && Object.keys(latest.dependencies).length > 0)
      ? latest.dependencies
      : (pkg.versions?.find(v => v.dependencies && Object.keys(v.dependencies).length > 0)?.dependencies ?? {});
    const ownerList = (owners.users ?? []).map(u => u.login ?? u);

    // README is per-version — fetch after we know which version is active
    const readme = await API.getReadme(name, activeVer.version);

    // Total downloads across all versions
    const totalDownloads = (pkg.versions ?? []).reduce((s, v) => s + (v.downloads ?? 0), 0);

    // ── Build header ───────────────────────────────────────────────────────
    const installLine = channel && channel !== 'stable'
      ? `${esc(name)} = { version = "${esc(latest.version ?? pkg.latest)}", channel = "${esc(channel)}" }`
      : `${esc(name)} = "${esc(latest.version ?? pkg.latest)}"`;

    // ── Build keywords ─────────────────────────────────────────────────────
    const kwHtml = (pkg.keywords ?? []).map(k =>
      `<a href="/?q=${encodeURIComponent(k)}" class="badge keyword">${esc(k)}</a>`
    ).join(' ');

    // ── Build versions table ───────────────────────────────────────────────
    const sortedVersions = (pkg.versions ?? []).slice().sort((a, b) => cmpVersion(b.version, a.version));
    const versionsHtml = sortedVersions.map(v => {
      const isActive = v.version === latest.version;
      const vUrl = `/packages/${esc(name)}?version=${esc(v.version)}${channel && channel !== 'stable' ? `&channel=${esc(channel)}` : ''}`;
      return `
      <tr class="${v.yanked ? 'yanked' : ''}${isActive ? ' version-active' : ''}">
        <td><a href="${vUrl}">${esc(v.version)}</a>
            ${v.yanked ? ' <span style="color:#f85149;font-size:11px">[yanked]</span>' : ''}
            ${isActive ? ' <span style="font-size:11px;color:var(--muted)">(viewing)</span>' : ''}</td>
        <td style="font-family:var(--font-mono);font-size:12px;color:var(--muted)">${esc((v.checksum ?? '').slice(0,12))}…</td>
        <td>${v.build_system ? `<span class="badge">${esc(v.build_system)}</span>` : '—'}</td>
        <td style="color:var(--green)">${fmtNum(v.downloads)}</td>
        <td>
          <a href="/api/v1/packages/${esc(name)}/${esc(v.version)}/download"
             style="font-size:12px;color:var(--muted)">↓ tar.gz</a>
        </td>
      </tr>`;
    }).join('');

    // ── Build dependencies ─────────────────────────────────────────────────
    const depEntries = Object.entries(deps);
    const depsHtml = depEntries.length === 0
      ? '<p style="color:var(--muted);font-size:13px">No dependencies.</p>'
      : `<table class="dep-table">${depEntries.map(([k, v]) => {
           const ver = typeof v === 'object' ? (v.version ?? JSON.stringify(v)) : v;
           const depChannel = typeof v === 'object' && v.channel ? `?channel=${encodeURIComponent(v.channel)}` : '';
           return `<tr>
             <td><a href="/packages/${encodeURIComponent(k)}${depChannel}" style="color:var(--accent)">${esc(k)}</a></td>
             <td>${esc(ver)}</td>
           </tr>`;
         }).join('')}</table>`;

    // ── Build prebuilts panel ──────────────────────────────────────────────
    const triples = latest.prebuilt_triples ?? [];
    const prebuiltsHtml = triples.length === 0
      ? ''
      : `<div style="margin-top:24px">
           <h2 style="font-size:16px;margin-bottom:12px">Prebuilt binaries</h2>
           <div class="prebuilt-list">
             ${triples.map(t => `
               <div class="prebuilt-row">
                 <span class="badge prebuilt">${esc(t)}</span>
                 <a href="/api/v1/packages/${esc(name)}/${esc(latest.version)}/prebuilt/${esc(t)}/download"
                    style="font-size:12px;color:var(--muted)">↓ download</a>
               </div>`).join('')}
           </div>
         </div>`;

    // ── Render README ──────────────────────────────────────────────────────
    let readmeHtml = '';
    if (readme) {
      readmeHtml = `<div class="readme">${renderMarkdown(readme)}</div>`;
    }

    // ── Assemble ───────────────────────────────────────────────────────────
    main.innerHTML = `
      <p style="font-size:13px;color:var(--muted);margin-bottom:16px">
        <a href="/">← Registry</a> / ${esc(name)}
      </p>

      <div class="pkg-header">
        <h1>
          ${esc(name)}
          ${channel && channel !== 'stable'
            ? `<span class="badge channel" style="font-size:14px;vertical-align:middle">${esc(channel)}</span>`
            : ''}
        </h1>
        <p class="pkg-desc-full">${esc(pkg.description ?? '')}</p>
        <div class="pkg-meta" style="margin-bottom:8px">
          <span class="badge version">v${esc(latest.version ?? pkg.latest)}</span>
          ${latest.build_system ? `<span class="badge">${esc(latest.build_system)}</span>` : ''}
          ${totalDownloads ? `<span class="badge dl">↓ ${fmtNum(totalDownloads)} total</span>` : ''}
          ${kwHtml}
        </div>
      </div>

      <div class="detail-grid">

        <!-- ── Left column: README → Versions → Prebuilts ── -->
        <div>
          ${readmeHtml || '<div style="height:4px"></div>'}

          <div class="versions-section" style="margin-top:${readmeHtml ? '24px' : '0'}">
            <h2>Versions</h2>
            <table>
              <thead>
                <tr>
                  <th>Version</th>
                  <th>Checksum</th>
                  <th>Build</th>
                  <th>Downloads</th>
                  <th>Download</th>
                </tr>
              </thead>
              <tbody>${versionsHtml}</tbody>
            </table>
          </div>

          ${prebuiltsHtml}
        </div>

        <!-- ── Right sidebar ── -->
        <div>

          <!-- Info (formerly Metadata) -->
          <div class="sidebar-box">
            <h3>Info</h3>
            <ul>
              <li>
                <span class="label">Latest</span>
                <span class="badge version">v${esc(pkg.versions?.[0]?.version ?? pkg.latest)}</span>
              </li>
              ${pkg.license ? `<li><span class="label">License</span><span class="meta-value">${esc(pkg.license)}</span></li>` : ''}
              ${totalDownloads ? `<li><span class="label">Downloads</span><span style="color:var(--green)">${fmtNum(totalDownloads)}</span></li>` : ''}
              ${(() => {
                const repo = repoUrl(latest.upstream_url);
                return repo
                  ? `<li><span class="label">Repository</span>
                     <a href="${esc(repo)}" target="_blank" class="meta-value meta-link">${esc(repoLabel(repo))} ↗</a></li>`
                  : '';
              })()}
              ${latest.upstream_url ? `<li><span class="label">Archive</span>
                <a href="${esc(latest.upstream_url)}" target="_blank" class="meta-value meta-link">tarball ↗</a>
              </li>` : ''}
            </ul>
          </div>

          <!-- Owners -->
          ${ownerList.length ? `
          <div class="sidebar-box">
            <h3>Owners</h3>
            <div class="owner-list">
              ${ownerList.map(o => `
              <div class="owner-row">
                <div class="owner-avatar">${esc(o[0].toUpperCase())}</div>
                <span class="owner-name">${esc(o)}</span>
              </div>`).join('')}
            </div>
          </div>` : ''}

          <!-- Platform support -->
          ${(() => {
            const sup = latest.supports || pkg.versions?.find(v => v.supports)?.supports;
            return sup ? `
          <div class="sidebar-box">
            <h3>Platform support</h3>
            <code class="supports-expr">${esc(sup)}</code>
          </div>` : '';
          })()}

          <!-- Install -->
          <div class="sidebar-box">
            <h3>Install</h3>
            <p style="font-size:12px;color:var(--muted);margin:0 0 8px">Add to <code>freight.toml</code>:</p>
            <div class="install-box" style="margin:0">
              <code id="install-code" style="font-size:12px">${installLine}</code>
              <button class="copy-btn" data-copy="${installLine}">Copy</button>
            </div>
          </div>

          <!-- Dependencies -->
          <div class="sidebar-box">
            <h3>Dependencies
              <span style="font-weight:400;color:var(--muted)"> — v${esc(latest.version ?? pkg.latest)}</span>
            </h3>
            ${depsHtml}
          </div>

          <!-- Quick links -->
          <div class="sidebar-box">
            <h3>Quick links</h3>
            <ul>
              <li><a href="/api/v1/packages/${esc(name)}" style="font-size:13px">JSON metadata ↗</a></li>
              <li><a href="/api/v1/packages/${esc(name)}/${esc(pkg.versions?.[0]?.version ?? pkg.latest)}/download"
                     style="font-size:13px">Download latest ↗</a></li>
            </ul>
          </div>

        </div>
      </div>`;
  } catch (err) {
    main.innerHTML = `<div class="error">Failed to load package: ${esc(err.message)}</div>`;
  }
}

// ── Platform support renderer ─────────────────────────────────────────────────
// Parses a freight/vcpkg boolean expression (e.g. "!uwp & !arm | linux")
// and renders each term as a green ✓ or red ✗ badge.

const PLATFORM_LABELS = {
  linux:    'Linux',
  windows:  'Windows',
  osx:      'macOS',
  macos:    'macOS',
  android:  'Android',
  ios:      'iOS',
  uwp:      'UWP',
  wasm32:   'WASM',
  wasm64:   'WASM64',
  x64:      'x64',
  x86:      'x86',
  arm:      'ARM',
  arm64:    'ARM64',
  arm32:    'ARM32',
  arm64ec:  'ARM64EC',
  emscripten: 'Emscripten',
  mingw:    'MinGW',
  static:   'static',
  staticcrt: 'static CRT',
  native:   'native',
  xbox:     'Xbox',
};

function cmpVersion(a, b) {
  const pa = a.split(/[.\-]/).map(x => parseInt(x, 10) || 0);
  const pb = b.split(/[.\-]/).map(x => parseInt(x, 10) || 0);
  const len = Math.max(pa.length, pb.length);
  for (let i = 0; i < len; i++) {
    const d = (pa[i] ?? 0) - (pb[i] ?? 0);
    if (d !== 0) return d;
  }
  return 0;
}

function renderSupports(expr) {
  if (!expr) return '';
  // Tokenise: split on & and | (keep !, identifiers and parens together per term)
  // Simple approach: split on & | , and trim each term.
  const terms = expr
    .split(/[&|,]+/)
    .map(t => t.trim().replace(/[()]/g, '').trim())
    .filter(Boolean);

  return terms.map(term => {
    const negated = term.startsWith('!');
    const id = term.replace(/^!/, '').trim().toLowerCase();
    const label = PLATFORM_LABELS[id] ?? id;
    return negated
      ? `<span class="support-badge support-no" title="Not supported: ${esc(label)}">✗ ${esc(label)}</span>`
      : `<span class="support-badge support-yes" title="Supported: ${esc(label)}">✓ ${esc(label)}</span>`;
  }).join('');
}

// ── Markdown renderer (no external deps) ─────────────────────────────────────
// Supports: fenced code, inline code, headers (h1–h3), bold, italic, links,
// images, blockquotes, ordered + unordered lists, tables (GFM), horizontal rules.

function renderMarkdown(md) {
  // 1. Extract fenced code blocks to protect them from further transforms
  const codeBlocks = [];
  let html = md.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const idx = codeBlocks.length;
    codeBlocks.push(`<pre><code${lang ? ` class="language-${lang}"` : ''}>${escMd(code.trimEnd())}</code></pre>`);
    return `\x00CODE${idx}\x00`;
  });

  // 2. Escape remaining HTML
  html = html
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // 3. Inline code (after HTML escape so < > inside are safe)
  html = html.replace(/`([^`]+)`/g, (_, c) => `<code>${c}</code>`);

  // 4. Headers
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm,  '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm,   '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm,    '<h1>$1</h1>');

  // 5. Bold / italic
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g,     '<strong>$1</strong>');
  html = html.replace(/\*([^*\n]+?)\*/g,    '<em>$1</em>');

  // 6. Links + images
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,
    '<img src="$2" alt="$1" style="max-width:100%">');
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // 7. Horizontal rule
  html = html.replace(/^([-*_]){3,}$/gm, '<hr style="border-color:var(--border)">');

  // 8. GFM tables  (|col|col| lines with a |---|---| separator)
  html = html.replace(
    /^(\|.+\|\n)\|[-| :]+\|\n((?:\|.+\|\n)*)/gm,
    (_, header, body) => {
      const thCells = header.trim().split('|').filter(Boolean)
        .map(c => `<th>${c.trim()}</th>`).join('');
      const tbRows = body.trim().split('\n').map(row => {
        const cells = row.split('|').filter(Boolean)
          .map(c => `<td>${c.trim()}</td>`).join('');
        return `<tr>${cells}</tr>`;
      }).join('\n');
      return `<table class="md-table"><thead><tr>${thCells}</tr></thead><tbody>${tbRows}</tbody></table>\n`;
    }
  );

  // 9. Blockquotes
  html = html.replace(/^&gt; (.+)$/gm, (_, text) => `<blockquote>${text}</blockquote>`);
  // Merge consecutive blockquotes
  html = html.replace(/<\/blockquote>\n<blockquote>/g, '\n');

  // 10. Lists — process blocks of consecutive list lines
  // Unordered
  html = html.replace(/((?:^[ \t]*[-*+] .+\n?)+)/gm, block => {
    const items = block.trim().split('\n')
      .map(l => `<li>${l.replace(/^[ \t]*[-*+] /, '')}</li>`).join('');
    return `<ul>${items}</ul>\n`;
  });
  // Ordered
  html = html.replace(/((?:^[ \t]*\d+\. .+\n?)+)/gm, block => {
    const items = block.trim().split('\n')
      .map(l => `<li>${l.replace(/^[ \t]*\d+\. /, '')}</li>`).join('');
    return `<ol>${items}</ol>\n`;
  });

  // 11. Paragraphs (double newline → <p>)
  html = html
    .split(/\n{2,}/)
    .map(block => {
      const t = block.trim();
      if (!t) return '';
      if (/^<(h[1-6]|pre|hr|ul|ol|table|blockquote|\x00CODE)/.test(t)) return t;
      return `<p>${t.replace(/\n/g, '<br>')}</p>`;
    })
    .filter(Boolean)
    .join('\n');

  // 12. Restore fenced code blocks
  html = html.replace(/\x00CODE(\d+)\x00/g, (_, i) => codeBlocks[+i]);

  return html;
}

/** Escape HTML inside code blocks (called before the main escape pass). */
function escMd(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
</script>
</body>
</html>
