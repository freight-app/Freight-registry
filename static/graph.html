<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dependency Graph — Freight Registry</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    body { overflow: hidden; display: flex; flex-direction: column; height: 100vh; }

    #toolbar {
      display: flex; align-items: center; gap: 10px;
      padding: 0 16px; height: 44px; flex-shrink: 0;
      background: var(--surface); border-bottom: 1px solid var(--border);
      font-size: 13px; position: relative;
    }

    #pkg-search-wrap { position: relative; }
    #pkg-search {
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); border-radius: var(--radius);
      padding: 5px 12px; font-size: 13px; width: 220px; outline: none;
    }
    #pkg-search:focus { border-color: var(--accent); }

    #autocomplete {
      position: absolute; top: calc(100% + 4px); left: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); width: 280px; max-height: 240px;
      overflow-y: auto; z-index: 300; display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .ac-item {
      padding: 6px 12px; cursor: pointer; font-size: 12px;
      display: flex; justify-content: space-between; align-items: center;
      color: var(--text);
    }
    .ac-item:hover, .ac-item.active { background: var(--border); }
    .ac-count { color: var(--muted); font-size: 11px; }

    #toolbar-info {
      color: var(--muted); font-size: 12px;
    }
    #toolbar-root {
      font-weight: 600; color: var(--text); font-size: 13px;
    }
    #toolbar-stats { color: var(--muted); margin-left: auto; font-size: 12px; }

    #cy { flex: 1; background: var(--bg); }

    #graph-loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      color: var(--muted); font-size: 14px; pointer-events: none; z-index: 10;
    }

    #empty-state {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      text-align: center; color: var(--muted); pointer-events: none;
    }
    #empty-state h2 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
    #empty-state p  { font-size: 13px; }

    #tooltip {
      position: fixed; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 8px 12px; font-size: 12px;
      pointer-events: none; display: none; z-index: 200; max-width: 280px;
    }
    #tooltip .tt-name { font-weight: 600; color: var(--text); margin-bottom: 2px; }
    #tooltip .tt-meta { color: var(--muted); line-height: 1.6; }
  </style>
</head>
<body>

      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>

<div id="toolbar">
  <div id="pkg-search-wrap">
    <input id="pkg-search" type="search" placeholder="Pick a package…" autocomplete="off" spellcheck="false">
    <div id="autocomplete"></div>
  </div>
  <span id="toolbar-root"></span>
  <span id="toolbar-info"></span>
  <span id="toolbar-stats"></span>
</div>

<div id="cy">
  <div id="graph-loading">
    <div class="spinner"></div>
    <span>Loading registry data…</span>
  </div>
  <div id="empty-state" style="display:none">
    <h2>Dependency graph</h2>
    <p>Search for a package above to explore its recursive dependency tree.</p>
  </div>
</div>

<div id="tooltip"></div>

<script src="/app.js"></script>
<script src="/cytoscape.min.js"></script>
<script>
'use strict';

// Global state
let depsMap   = {};  // name → [dep names]  (direct deps)
let allNames  = [];  // sorted list of all package names
let transCache = {}; // name → Set of all transitive dep names
let cy        = null;

document.addEventListener('DOMContentLoaded', async () => {
  await loadData();
  setupSearch();

  // If ?pkg= in URL, render immediately
  const params = new URLSearchParams(location.search);
  const pkg = params.get('pkg');
  if (pkg && depsMap[pkg] !== undefined) {
    document.getElementById('pkg-search').value = pkg;
    renderPackage(pkg);
  }
});

// ── Data loading ─────────────────────────────────────────────────────────────

async function loadData() {
  const params  = new URLSearchParams(location.search);
  const channel = params.get('channel') ?? undefined;
  let url = '/api/v1/graph';
  if (channel) url += `?channel=${encodeURIComponent(channel)}`;

  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const data = await r.json();

  for (const pkg of data) {
    depsMap[pkg.name] = pkg.deps ?? [];
  }
  allNames = Object.keys(depsMap).sort();

  document.getElementById('graph-loading').style.display = 'none';
  document.getElementById('empty-state').style.display   = 'block';
}

// ── Transitive closure ───────────────────────────────────────────────────────

// Returns a Set of all transitive dependency names for `name` (excluding itself).
function transitiveDeps(root) {
  if (transCache[root]) return transCache[root];
  const visited = new Set();
  const stack = [root];
  while (stack.length) {
    const cur = stack.pop();
    for (const dep of (depsMap[cur] ?? [])) {
      if (!visited.has(dep)) {
        visited.add(dep);
        stack.push(dep);
      }
    }
  }
  transCache[root] = visited;
  return visited;
}

// ── Tree builder ─────────────────────────────────────────────────────────────

// Build a tree (DAG with cycle-breaking) rooted at `root`.
// Returns { nodes: [{id, label, data}], edges: [{source, target}] }
function buildTree(root) {
  const nodes = [];
  const edges = [];
  const seen  = new Set(); // nodes already added to the tree (cycle guard)

  // BFS preserving order
  const queue = [root];
  seen.add(root);

  while (queue.length) {
    const name = queue.shift();
    const tc   = transitiveDeps(name).size;
    const isRoot = name === root;
    nodes.push({ id: name, label: name, transCount: tc, isRoot });

    for (const dep of (depsMap[name] ?? [])) {
      edges.push({ source: name, target: dep });
      if (!seen.has(dep)) {
        seen.add(dep);
        queue.push(dep);
      }
      // If dep already seen: edge is drawn but no duplicate node added.
    }
  }

  return { nodes, edges };
}

// ── Render ───────────────────────────────────────────────────────────────────

function renderPackage(name) {
  document.getElementById('empty-state')?.remove();

  const { nodes, edges } = buildTree(name);
  const totalTransitive  = transitiveDeps(name).size;

  // Update URL
  const u = new URL(location.href);
  u.searchParams.set('pkg', name);
  history.replaceState(null, '', u);

  // Toolbar
  document.getElementById('toolbar-root').textContent = name;
  document.getElementById('toolbar-info').textContent =
    `→ ${totalTransitive} transitive package${totalTransitive !== 1 ? 's' : ''}`;
  document.getElementById('toolbar-stats').textContent =
    `${nodes.length} nodes · ${edges.length} edges`;

  const maxTC = Math.max(1, ...nodes.map(n => n.transCount));

  const cyNodes = nodes.map(n => ({
    data: {
      id:         n.id,
      label:      n.label,
      transCount: n.transCount,
      isRoot:     n.isRoot,
    },
  }));

  const cyEdges = edges.map((e, i) => ({
    data: { id: `e${i}`, source: e.source, target: e.target },
  }));

  if (window._floatCancel) { window._floatCancel(); window._floatCancel = null; }
  if (cy) { cy.destroy(); cy = null; }

  cy = window.cytoscape({
    container: document.getElementById('cy'),
    elements:  { nodes: cyNodes, edges: cyEdges },
    style: [
      {
        selector: 'node',
        style: {
          'background-color': ele => {
            if (ele.data('isRoot')) return '#f78166';
            const t = Math.min(ele.data('transCount') / maxTC, 1);
            return lerpColor('#2d4a2d', '#f0a000', t);
          },
          'border-color':  ele => ele.data('isRoot') ? '#ff9580' : '#30363d',
          'border-width':  ele => ele.data('isRoot') ? 2 : 1,
          'label':         ele => {
            const tc = ele.data('transCount');
            return tc > 0 ? `${ele.data('label')}\n(+${tc})` : ele.data('label');
          },
          'color':            '#e6edf3',
          'font-size':        ele => ele.data('isRoot') ? 12 : 10,
          'font-family':      '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
          'text-valign':      'center',
          'text-halign':      'center',
          'text-wrap':        'wrap',
          'width':            ele => {
            const base = ele.data('isRoot') ? 80 : 60;
            const extra = Math.min(ele.data('transCount') / maxTC * 30, 30);
            return base + extra;
          },
          'height':           ele => ele.data('isRoot') ? 40 : 30,
          'shape':            'round-rectangle',
          'min-zoomed-font-size': 7,
        },
      },
      {
        selector: 'edge',
        style: {
          'width':               1,
          'line-color':          '#30363d',
          'target-arrow-color':  '#484f58',
          'target-arrow-shape':  'triangle',
          'curve-style':         'bezier',
          'arrow-scale':         0.6,
          'opacity':             0.7,
        },
      },
      {
        selector: 'node.highlighted',
        style: { 'border-color': '#58a6ff', 'border-width': 3, 'opacity': 1 },
      },
      {
        selector: 'node.dimmed',
        style: { 'opacity': 0.2 },
      },
      {
        selector: 'edge.dimmed',
        style: { 'opacity': 0.05 },
      },
      {
        selector: 'edge.highlighted',
        style: { 'line-color': '#58a6ff', 'target-arrow-color': '#58a6ff', 'opacity': 1, 'width': 2 },
      },
    ],
    userZoomingEnabled: true,
    userPanningEnabled: true,
    minZoom: 0.05,
    maxZoom: 8,
  });

  // ── Force simulation ──────────────────────────────────────────────────────
  // Register before running layout — breadthfirst is synchronous so layoutstop
  // fires inside .run(), which would be too late if registered after.
  cy.one('layoutstop', () => { window._floatCancel = startForce(cy); });

  cy.layout({
    name:          'breadthfirst',
    directed:      true,
    spacingFactor: 1.4,
    padding:       48,
    avoidOverlap:  true,
    nodeDimensionsIncludeLabels: true,
  }).run();

  // ── Tooltip ────────────────────────────────────────────────────────────────
  const tooltip = document.getElementById('tooltip');

  const cyContainer = document.getElementById('cy');
  cy.on('mouseover', 'node', e => {
    cyContainer.style.cursor = 'pointer';
    e.target.style({ 'border-color': '#58a6ff', 'border-width': 2 });
    const d  = e.target.data();
    const tc = d.transCount;
    const direct = (depsMap[d.id] ?? []).length;
    tooltip.innerHTML = `
      <div class="tt-name">${esc(d.label)}</div>
      <div class="tt-meta">
        ${direct} direct dep${direct !== 1 ? 's' : ''}<br>
        ${tc} transitive package${tc !== 1 ? 's' : ''} total
      </div>`;
    tooltip.style.display = 'block';
  });
  cy.on('mouseout', 'node', e => {
    cyContainer.style.cursor = '';
    const isRoot = e.target.data('isRoot');
    e.target.style({
      'border-color': isRoot ? '#ff9580' : '#30363d',
      'border-width': isRoot ? 2 : 1,
    });
    tooltip.style.display = 'none';
  });
  cy.on('mousemove', e => {
    tooltip.style.left = (e.originalEvent.clientX + 14) + 'px';
    tooltip.style.top  = (e.originalEvent.clientY + 14) + 'px';
  });

  // ── Click: re-root on single click, navigate on double ───────────────────
  let clickTimer = null;
  cy.on('tap', 'node', e => {
    const id = e.target.data('id');
    if (clickTimer) {
      clearTimeout(clickTimer);
      clickTimer = null;
      location.href = `/packages/${encodeURIComponent(id)}`;
    } else {
      clickTimer = setTimeout(() => {
        clickTimer = null;
        if (id !== name) {
          document.getElementById('pkg-search').value = id;
          renderPackage(id);
        }
      }, 220);
    }
  });
}

// ── Search / autocomplete ─────────────────────────────────────────────────────

function setupSearch() {
  const input = document.getElementById('pkg-search');
  const ac    = document.getElementById('autocomplete');
  let acIdx   = -1;

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    if (!q) { ac.style.display = 'none'; return; }

    const matches = allNames
      .filter(n => n.toLowerCase().includes(q))
      .slice(0, 30);

    if (!matches.length) { ac.style.display = 'none'; return; }

    ac.innerHTML = matches.map((n, i) => {
      const tc = transitiveDeps(n).size;
      return `<div class="ac-item" data-name="${esc(n)}" data-idx="${i}">
        <span>${esc(n)}</span>
        <span class="ac-count">${tc > 0 ? `+${tc}` : '—'}</span>
      </div>`;
    }).join('');
    acIdx = -1;
    ac.style.display = 'block';
  });

  input.addEventListener('keydown', e => {
    const items = ac.querySelectorAll('.ac-item');
    if (e.key === 'ArrowDown') {
      acIdx = Math.min(acIdx + 1, items.length - 1);
      items.forEach((el, i) => el.classList.toggle('active', i === acIdx));
      e.preventDefault();
    } else if (e.key === 'ArrowUp') {
      acIdx = Math.max(acIdx - 1, -1);
      items.forEach((el, i) => el.classList.toggle('active', i === acIdx));
      e.preventDefault();
    } else if (e.key === 'Enter') {
      const name = acIdx >= 0 ? items[acIdx]?.dataset.name : input.value.trim();
      if (name && depsMap[name] !== undefined) { select(name); }
      e.preventDefault();
    } else if (e.key === 'Escape') {
      ac.style.display = 'none';
    }
  });

  ac.addEventListener('mousedown', e => {
    const item = e.target.closest('.ac-item');
    if (item) { e.preventDefault(); select(item.dataset.name); }
  });

  document.addEventListener('click', e => {
    if (!input.contains(e.target) && !ac.contains(e.target)) {
      ac.style.display = 'none';
    }
  });

  function select(name) {
    input.value = name;
    ac.style.display = 'none';
    renderPackage(name);
  }
}

// ── Force simulation ──────────────────────────────────────────────────────────
// Runs a continuous spring-repulsion loop on a Cytoscape instance.
// Returns a cancel function.

function startForce(cy) {
  // Terminal velocity = F * DAMPING / (1 - DAMPING).
  // SPRING_K must satisfy: SPRING_K * max_stretch * D/(1-D) < MAX_SPEED.
  // At D=0.88, max_stretch≈200: SPRING_K < 10*0.12/(200*0.88) ≈ 0.007. Use 0.006.
  const REPULSION  = 6000;   // node-node repulsion (floored at minSep)
  const SPRING_K   = 0.006;  // edge spring stiffness
  const SPRING_LEN = 80;     // rest length; rubber band only pulls when d > this
  const DAMPING    = 0.88;   // velocity retention per tick
  const GRAVITY    = 0.001;  // weak center pull
  const NUDGE      = 0.03;   // tiny jitter so nodes don't fully freeze
  const MAX_SPEED  = 10;     // px/tick velocity cap
  const PAD        = 14;     // minimum gap between node edges

  const vel     = {};
  const nodeArr = cy.nodes().toArray();
  const cnt     = nodeArr.length;
  const idxOf   = Object.fromEntries(nodeArr.map((n, i) => [n.id(), i]));
  const edgeArr = cy.edges().toArray();
  // Collision radius = half the node's rendered width + padding gap
  const nodeR   = nodeArr.map(n => n.width() / 2 + PAD);
  cy.nodes().forEach(n => { vel[n.id()] = { x: 0, y: 0 }; });

  let raf;
  function tick() {
    const cx  = cy.width()  / 2;
    const cy_ = cy.height() / 2;
    const fx  = new Float64Array(cnt);
    const fy  = new Float64Array(cnt);

    // Repulsion — floor effective distance at minSep so nodes never overlap
    for (let i = 0; i < cnt; i++) {
      const pi = nodeArr[i].position();
      for (let j = i + 1; j < cnt; j++) {
        const pj = nodeArr[j].position();
        const dx = pj.x - pi.x, dy = pj.y - pi.y;
        const d      = Math.max(Math.sqrt(dx*dx + dy*dy), 1);
        const minSep = nodeR[i] + nodeR[j];
        const effD   = Math.max(d, minSep);   // force can't weaken past what minSep gives
        const f      = REPULSION / (effD * effD);
        const nx = f * dx / d, ny = f * dy / d;
        fx[i] -= nx; fy[i] -= ny;
        fx[j] += nx; fy[j] += ny;
      }
    }

    // Spring attraction along edges (rubber band: only pulls when stretched)
    for (const e of edgeArr) {
      const si = idxOf[e.source().id()];
      const ti = idxOf[e.target().id()];
      if (si == null || ti == null) continue;
      const ps = nodeArr[si].position(), pt = nodeArr[ti].position();
      const dx = pt.x - ps.x, dy = pt.y - ps.y;
      const d  = Math.max(Math.sqrt(dx*dx + dy*dy), 1);
      const f  = Math.max(0, SPRING_K * (d - SPRING_LEN));
      const nx = f * dx / d, ny = f * dy / d;
      fx[si] += nx; fy[si] += ny;
      fx[ti] -= nx; fy[ti] -= ny;
    }

    // Integrate with velocity cap
    for (let i = 0; i < cnt; i++) {
      const n = nodeArr[i];
      const p = n.position();
      const v = vel[n.id()];
      fx[i] += GRAVITY * (cx - p.x);
      fy[i] += GRAVITY * (cy_ - p.y);
      v.x = (v.x + fx[i]) * DAMPING + (Math.random() - 0.5) * NUDGE;
      v.y = (v.y + fy[i]) * DAMPING + (Math.random() - 0.5) * NUDGE;
      const spd = Math.sqrt(v.x*v.x + v.y*v.y);
      if (spd > MAX_SPEED) { v.x = v.x/spd*MAX_SPEED; v.y = v.y/spd*MAX_SPEED; }
      n.position({ x: p.x + v.x, y: p.y + v.y });
    }

    raf = requestAnimationFrame(tick);
  }
  raf = requestAnimationFrame(tick);
  return () => cancelAnimationFrame(raf);
}

// ── Colour helper ─────────────────────────────────────────────────────────────

function lerpColor(a, b, t) {
  const parse = h => [
    parseInt(h.slice(1,3),16),
    parseInt(h.slice(3,5),16),
    parseInt(h.slice(5,7),16),
  ];
  const ca = parse(a), cb = parse(b);
  const r = Math.round(ca[0] + (cb[0]-ca[0])*t);
  const g = Math.round(ca[1] + (cb[1]-ca[1])*t);
  const bl= Math.round(ca[2] + (cb[2]-ca[2])*t);
  return `rgb(${r},${g},${bl})`;
}
</script>
