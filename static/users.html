<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User — Freight Registry</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>

<nav>
  <a class="nav-logo" href="/">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
      <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
      <line x1="12" y1="22.08" x2="12" y2="12"/>
    </svg>
    Freight
  </a>
  <div class="nav-search">
    <input type="search" id="nav-q" placeholder="Search packages…" autocomplete="off">
  </div>
  <div class="nav-links">
    <a href="https://github.com/TiniTinyTerminator/Freight" target="_blank">Docs</a>
    <a href="https://github.com/TiniTinyTerminator/Freight-registry" target="_blank">GitHub</a>
    <a id="nav-auth" href="/login">Login</a>
  </div>
  <button class="nav-settings-btn" id="nav-settings" aria-label="Settings" title="Settings">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
  <button class="nav-hamburger" id="nav-hamburger" aria-label="Menu">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
</nav>

<main>
  <div id="profile-header" style="margin-bottom:28px"></div>
  <div id="packages-section"></div>
</main>

<footer>
  <span>© 2026 Freight</span>
  <span><a href="/health">Status</a> · <a href="https://github.com/TiniTinyTerminator/Freight" target="_blank">Docs</a></span>
</footer>

<script src="/app.js"></script>
<script>
'use strict';

const username = location.pathname.split('/').filter(Boolean).pop();
document.title = `@${username} — Freight Registry`;

document.addEventListener('DOMContentLoaded', async () => {
  const headerEl = document.getElementById('profile-header');
  const pkgsEl   = document.getElementById('packages-section');

  headerEl.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  pkgsEl.innerHTML   = '';

  try {
    const r = await fetch(`/api/v1/users/${encodeURIComponent(username)}`);
    if (r.status === 404) {
      headerEl.innerHTML = `<div class="error">User <strong>@${esc(username)}</strong> not found.</div>`;
      return;
    }
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();

    headerEl.innerHTML = `
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
        <div style="width:64px;height:64px;border-radius:50%;background:var(--accent);
                    display:flex;align-items:center;justify-content:center;
                    font-size:1.8rem;font-weight:700;color:#fff;flex-shrink:0">
          ${esc(data.username[0].toUpperCase())}
        </div>
        <div>
          <h1 style="margin:0;font-size:1.5rem">@${esc(data.username)}</h1>
          <p style="margin:4px 0 0;color:var(--muted);font-size:13px">
            ${data.packages.length} package${data.packages.length !== 1 ? 's' : ''} published
          </p>
        </div>
      </div>`;

    if (data.packages.length === 0) {
      pkgsEl.innerHTML = '<div class="empty">No packages published yet.</div>';
      return;
    }

    pkgsEl.innerHTML = '<h2 style="margin-bottom:12px">Packages</h2>';
    renderPackageCards(data.packages.map(p => ({
      name:        p.name,
      channel:     p.channel,
      description: p.description,
      license:     p.license,
      latest:      p.version,
      keywords:    [],
    })), pkgsEl);
  } catch (err) {
    headerEl.innerHTML = `<div class="error">Failed to load profile: ${esc(err.message)}</div>`;
  }
});
</script>
</body>
</html>
