<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docs — Freight Registry</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    body { flex-direction: column; }

    .docs-page {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px 80px;
      width: 100%;
      box-sizing: border-box;
    }

    /* ── Local callout card ─────────────────────────────────────────────── */
    .local-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 36px;
    }

    .local-card h2 {
      margin: 0 0 8px;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }

    .local-card p {
      margin: 0 0 14px;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
    }

    .local-card p code {
      font-family: var(--font-mono);
      background: var(--code-bg);
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 13px;
      color: var(--text);
    }

    .cmd-copy {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-family: var(--font-mono);
      font-size: 13.5px;
      color: var(--text);
    }

    .cmd-copy span {
      flex: 1;
      user-select: all;
    }

    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      padding: 3px 8px;
      font-family: var(--font-sans, inherit);
      transition: color .12s, border-color .12s;
    }

    .copy-btn:hover { color: var(--accent); border-color: var(--accent); }
    .copy-btn.copied { color: #4ade80; border-color: #4ade80; }

    /* ── Symbol index ────────────────────────────────────────────────────── */
    .sym-section {
      margin-bottom: 32px;
    }

    .sym-section-hdr {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding-bottom: 7px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0;
    }

    .sym-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .sym-table tr { border-bottom: 1px solid rgba(48,54,61,.7); }
    .sym-table tr:last-child { border-bottom: none; }
    .sym-table tr:hover { background: rgba(255,255,255,.02); }
    .sym-table td { padding: 7px 8px; vertical-align: top; }

    .sym-table .td-name {
      font-family: var(--font-mono);
      font-size: 12.5px;
      white-space: nowrap;
      width: 35%;
      color: var(--text);
    }

    .sym-table .td-chip {
      white-space: nowrap;
      width: 56px;
    }

    .sym-table .td-brief {
      color: var(--muted);
      font-size: 12px;
    }

    .kind-chip {
      font-size: 9.5px;
      font-family: var(--font-mono);
      font-weight: 600;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 3px;
      padding: 1px 5px;
    }

    /* ── Package header ──────────────────────────────────────────────────── */
    .pkg-hdr {
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--border);
    }

    .pkg-hdr h1 {
      margin: 0 0 4px;
      font-size: 1.4rem;
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pkg-hdr .ver { font-size: 1rem; font-weight: 400; color: var(--muted); }
    .pkg-hdr .back { font-size: 13px; color: var(--muted); }
    .pkg-hdr .back a { color: var(--muted); }
    .pkg-hdr .back a:hover { color: var(--accent); text-decoration: none; }

    /* ── Empty / no-docs state ───────────────────────────────────────────── */
    .no-docs {
      font-size: 13px;
      color: var(--muted);
      padding: 10px 0 0;
    }

    @media (max-width: 600px) {
      .docs-page { padding: 24px 16px 60px; }
      .cmd-copy  { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
      <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
      <line x1="12" y1="22.08" x2="12" y2="12"/>
    </svg>
    Freight
  </a>
  <div class="nav-search">
    <input type="search" id="nav-q" placeholder="Search packages…" autocomplete="off">
  </div>
  <div class="nav-links">
    <a href="https://github.com/TiniTinyTerminator/Freight" target="_blank">Docs</a>
    <a href="https://github.com/TiniTinyTerminator/Freight-registry" target="_blank">GitHub</a>
    <a id="nav-auth" href="/login">Login</a>
  </div>
  <button class="nav-settings-btn" id="nav-settings" aria-label="Settings" title="Settings">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
  <button class="nav-hamburger" id="nav-hamburger" aria-label="Menu">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
</nav>

<div class="docs-page" id="docs-page">
  <div class="loading"><div class="spinner"></div></div>
</div>

<script src="/app.js"></script>
<script>
'use strict';

const pathParts = location.pathname.split('/').filter(Boolean);
const pkgName   = pathParts[1] ?? '';
document.title  = `${pkgName} — Docs`;

const KIND_LABEL = {
  fn:'fn', sub:'sub', macro:'macro',
  struct:'struct', class:'class', enum:'enum',
  type:'type', iface:'interface', var:'var',
  mod:'namespace', item:'item',
};

const TYPE_KINDS = new Set(['class','struct','iface','enum','type']);
const FN_KINDS   = new Set(['fn','sub','macro']);

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function shortName(q) {
  const p = q.split(/::|\./);
  return p[p.length - 1] ?? q;
}

function chip(kind) {
  return `<span class="kind-chip">${esc(KIND_LABEL[kind] ?? kind)}</span>`;
}

function sorted(items) {
  return [...items].sort((a, b) => shortName(a.name).localeCompare(shortName(b.name)));
}

function renderSection(title, items) {
  if (!items.length) return '';
  let html = `<div class="sym-section">
    <div class="sym-section-hdr">${title}</div>
    <table class="sym-table">`;
  for (const it of sorted(items)) {
    html += `<tr>
      <td class="td-name">${esc(it.name)}</td>
      <td class="td-chip">${chip(it.kind)}</td>
      <td class="td-brief">${esc(it.brief ?? '')}</td>
    </tr>`;
  }
  html += `</table></div>`;
  return html;
}

document.addEventListener('DOMContentLoaded', async () => {
  const page = document.getElementById('docs-page');

  // "Browse locally" card — shown immediately, pkgName interpolated
  const cmdText = `freight doc ${pkgName}`;
  const localCard = `
    <div class="local-card">
      <h2>Interactive Documentation</h2>
      <p>The best way to read this package's documentation is with the <code>freight doc</code> TUI
      browser — it reads source files directly with syntax highlighting, cross-references, and
      full-text search.</p>
      <div class="cmd-copy">
        <span id="cmd-text">${esc(cmdText)}</span>
        <button class="copy-btn" id="copy-btn">Copy</button>
      </div>
    </div>`;

  try {
    const [pkgInfo, docsResp] = await Promise.all([
      API.getPackage(pkgName),
      fetch(`/api/v1/packages/${encodeURIComponent(pkgName)}/latest/docs`),
    ]);

    let pkgHdr = '';
    if (pkgInfo) {
      pkgHdr = `<div class="pkg-hdr">
        <h1>${esc(pkgInfo.name)} <span class="ver">v${esc(pkgInfo.latest ?? '')}</span></h1>
        <div class="back"><a href="/packages/${esc(pkgInfo.name)}">← Back to package</a></div>
      </div>`;
    }

    let docsData = null;
    if (docsResp.ok) {
      docsData = await docsResp.json();
    } else if (pkgInfo?.latest) {
      const r2 = await fetch(`/api/v1/packages/${encodeURIComponent(pkgName)}/${encodeURIComponent(pkgInfo.latest)}/docs`);
      if (r2.ok) docsData = await r2.json();
    }

    let symbolIndex = '';
    if (docsData?.items?.length) {
      const items = docsData.items.filter(i => i.name);
      const types = items.filter(i => TYPE_KINDS.has(i.kind));
      const fns   = items.filter(i => FN_KINDS.has(i.kind));
      const vars  = items.filter(i => i.kind === 'var');
      const rest  = items.filter(i => !TYPE_KINDS.has(i.kind) && !FN_KINDS.has(i.kind) && i.kind !== 'var');

      symbolIndex = renderSection('Types', types)
                  + renderSection('Functions', fns)
                  + renderSection('Variables', vars)
                  + renderSection('Other', rest);
    } else {
      symbolIndex = `<p class="no-docs">No symbol index uploaded. Run <code style="font-family:var(--font-mono);background:var(--code-bg);padding:1px 5px;border-radius:3px">freight doc</code> locally to browse the source.</p>`;
    }

    page.innerHTML = pkgHdr + localCard + symbolIndex;

  } catch (err) {
    page.innerHTML = localCard
      + `<p class="no-docs">Could not load symbol index: ${esc(String(err.message ?? err))}</p>`;
  }

  // Copy button
  const copyBtn = document.getElementById('copy-btn');
  if (copyBtn) {
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(cmdText).then(() => {
        copyBtn.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 1800);
      }).catch(() => {});
    });
  }
});
</script>
</body>
</html>
