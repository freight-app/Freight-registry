# freight-registry — nginx download server split (mode 3: separate download URL)
#
# The registry server handles auth, publish, search, and API calls.
# A separate nginx container serves package tarballs as plain static files.
# The registry redirects download requests to nginx with a 302 — no bytes
# pass through the registry process.
#
# Usage:
#   docker compose -f docker-compose.nginx.yml up -d
#
# First-time setup (create the admin user):
#   docker compose -f docker-compose.nginx.yml exec registry \
#       freight-registry --data /data user add admin --email admin@example.com
#
# Layout inside the shared volume:
#   /data/registry.db           ← SQLite database
#   /data/tarballs/             ← package files (served by nginx)
#     zlib/1.3.2/zlib-1.3.2.tar.gz
#     openssl/3.2.0/openssl-3.2.0.tar.gz
#     …

services:

  # ── Registry API server ──────────────────────────────────────────────────────
  registry:
    build: .
    image: freight-registry
    ports:
      - "7878:7878"          # API + publish endpoint
    volumes:
      - data:/data
    environment:
      FREIGHT_BASE_URL:     "https://freight.example.com"
      FREIGHT_DOWNLOAD_URL: "https://downloads.example.com"  # ← nginx below
      RUST_LOG: "freight_registry=info"
    restart: unless-stopped
    depends_on:
      - downloads

  # ── Download server (nginx — serves /data/tarballs as static files) ──────────
  downloads:
    image: nginx:alpine
    ports:
      - "8080:80"            # expose separately; put a CDN / reverse proxy in front
    volumes:
      - data:/data:ro        # read-only: only the registry writes here
      - ./deploy/nginx-downloads.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  data:
