<!DOCTYPE html>
<html lang="en">
<head>

<body>

<nav>

    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>

    Freight

  <div class="nav-search"></div>
  <div class="nav-links">
    <a href="https://github.com/TiniTinyTerminator/Freight" target="_blank">Docs</a>

    <a id="nav-auth" href="/login">Login</a>
  </div>
  <button class="nav-hamburger" id="nav-hamburger" aria-label="Menu">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">

<main style="text-align:center; padding-top:80px">
  <div style="font-size:5rem; font-weight:800; color:var(--accent); line-height:1">404</div>
  <h1 style="font-size:1.5rem; margin:16px 0 8px; color:var(--text)">Page not found</h1>
  <p style="color:var(--muted); margin:0 0 32px">The page you're looking for doesn't exist or has been moved.</p>
  <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap">
    <a href="/" style="background:var(--accent); color:#fff; padding:10px 24px; border-radius:var(--radius); font-weight:600; text-decoration:none">
      ← Back to registry
    </a>
    <a href="/" style="background:var(--surface); color:var(--muted); padding:10px 24px; border-radius:var(--radius); border:1px solid var(--border); text-decoration:none"
       onclick="history.back(); return false">
      Go back
    </a>
  </div>
</main>

<footer>
  <span>© 2026 Freight</span>
  <span>
    <a href="/health">Status</a> ·
