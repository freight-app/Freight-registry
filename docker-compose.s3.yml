# freight-registry — MinIO / S3 backend with presigned URLs (mode 2)
#
# Package tarballs are stored in MinIO (S3-compatible).  The registry server
# generates a presigned URL on each download request and returns a 302 — the
# client fetches the file directly from MinIO.  No bytes pass through the
# registry process.
#
# For AWS S3 instead of MinIO, remove the `minio` service and set:
#   FREIGHT_S3_ENDPOINT: (omit — uses AWS default)
#   FREIGHT_S3_KEY_ID:   your AWS access key
#   FREIGHT_S3_SECRET:   your AWS secret key
#   FREIGHT_S3_REGION:   us-east-1 (or your region)
#
# Usage:
#   docker compose -f docker-compose.s3.yml up -d
#
# MinIO console is available at http://localhost:9001 (admin / changeme123)

services:

  # ── Registry API server ──────────────────────────────────────────────────────
  registry:
    build: .
    image: freight-registry
    ports:
      - "7878:7878"
    volumes:
      - db:/data            # only the SQLite database; tarballs go to MinIO
    environment:
      FREIGHT_BASE_URL:    "http://localhost:7878"
      # S3 / MinIO storage backend
      FREIGHT_S3_BUCKET:   "freight-packages"
      FREIGHT_S3_ENDPOINT: "http://minio:9000"
      FREIGHT_S3_KEY_ID:   "minioadmin"
      FREIGHT_S3_SECRET:   "changeme123"
      FREIGHT_S3_REGION:   "us-east-1"
      # No FREIGHT_DOWNLOAD_URL — presigned S3 URLs are generated automatically.
      RUST_LOG: "freight_registry=info"
    restart: unless-stopped
    depends_on:
      minio-init:
        condition: service_completed_successfully

  # ── MinIO (S3-compatible object store) ───────────────────────────────────────
  minio:
    image: minio/minio
    ports:
      - "9000:9000"         # S3 API
      - "9001:9001"         # web console
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER:     "minioadmin"
      MINIO_ROOT_PASSWORD: "changeme123"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Create the bucket on first start ─────────────────────────────────────────
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin changeme123 &&
        mc mb --ignore-existing local/freight-packages &&
        echo 'bucket ready'
      "

volumes:
  db:
  minio-data:
