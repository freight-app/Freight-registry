<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docs — Freight Registry</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/highlight.min.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    /* ── Override highlight.js with TUI-matching One Dark palette ─────────── */
    .hljs { background: transparent !important; color: rgb(200,210,220); }
    .hljs-keyword, .hljs-selector-tag, .hljs-tag { color: rgb(198,120,221); }
    .hljs-string, .hljs-attr, .hljs-attribute  { color: rgb(152,195,121); }
    .hljs-number, .hljs-literal                { color: rgb(229,192,123); }
    .hljs-comment, .hljs-quote                 { color: rgb(92,99,112); font-style: italic; }
    .hljs-title, .hljs-name, .hljs-section     { color: rgb(97,175,239); }
    .hljs-type, .hljs-class .hljs-title        { color: rgb(229,192,123); }
    .hljs-built_in, .hljs-builtin-name         { color: rgb(86,182,194); }
    .hljs-operator, .hljs-punctuation          { color: rgb(180,180,200); }
    .hljs-variable, .hljs-template-variable    { color: rgb(200,220,200); }
    .hljs-params                               { color: rgb(180,180,180); }
    .hljs-meta                                 { color: rgb(130,170,130); }
    /* ── TUI color palette ─────────────────────────────────────────────────── */
    :root {
      --tui-pkg:     rgb(220,200,120);
      --tui-section: rgb(140,140,180);
      --tui-symbol:  rgb(200,220,200);
      --tui-brief:   rgb(180,180,180);
      --tui-border:  rgb(80,80,100);
      --tui-active:  rgb(120,160,220);
      --tui-hint:    rgb(100,100,100);
      --tui-kind:    rgb(130,170,130);
      --tui-bg:      rgb(13,14,20);
      --tui-surface: rgb(20,22,30);

      /* heading pill colors */
      --h1-fg: rgb(229,192,123); --h1-bg: rgb(50,44,18);
      --h2-fg: rgb(152,195,121); --h2-bg: rgb(24,44,20);
      --h3-fg: rgb(97,175,239);  --h3-bg: rgb(18,33,50);
      --h4-fg: rgb(198,120,221); --h4-bg: rgb(34,18,44);
    }

    /* ── Reset for docs layout ─────────────────────────────────────────────── */
    body {
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
      background: var(--tui-bg);
      color: rgb(200,210,220);
      margin: 0;
      padding: 0;
      flex-direction: column;
    }

    /* ── Two-column layout ─────────────────────────────────────────────────── */
    #docs-layout {
      display: flex;
      height: calc(100vh - 52px); /* subtract nav */
      overflow: hidden;
    }

    /* ── Sidebar ───────────────────────────────────────────────────────────── */
    #docs-sidebar {
      width: 280px;
      min-width: 220px;
      max-width: 340px;
      background: var(--tui-surface);
      border-right: 1px solid var(--tui-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    #sidebar-header {
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--tui-border);
      flex-shrink: 0;
    }

    #sidebar-pkg-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--tui-pkg);
      letter-spacing: 0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #sidebar-pkg-ver {
      font-size: 11px;
      color: var(--tui-hint);
      margin-top: 2px;
    }

    .sidebar-meta-row {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--tui-hint);
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-meta-row a {
      color: var(--tui-active);
      text-decoration: none;
    }
    .sidebar-meta-row a:hover { text-decoration: underline; }
    .sidebar-meta-label {
      color: var(--tui-hint);
      flex-shrink: 0;
    }
    .sidebar-owner-chip {
      background: rgba(130,170,130,0.12);
      border: 1px solid rgba(130,170,130,0.25);
      border-radius: 3px;
      padding: 0 5px;
      font-size: 10px;
      color: var(--tui-kind);
      white-space: nowrap;
    }
    #sidebar-back {
      font-size: 11px;
      margin-top: 6px;
    }
    #sidebar-back a {
      color: var(--tui-hint);
      text-decoration: none;
    }
    #sidebar-back a:hover { color: var(--tui-active); }

    #sidebar-search-wrap {
      padding: 8px 10px;
      border-bottom: 1px solid var(--tui-border);
      flex-shrink: 0;
    }

    #sidebar-search {
      width: 100%;
      box-sizing: border-box;
      background: var(--tui-bg);
      border: 1px solid var(--tui-border);
      border-radius: 3px;
      padding: 5px 9px;
      font-family: inherit;
      font-size: 12px;
      color: var(--tui-symbol);
      outline: none;
      transition: border-color .15s;
    }
    #sidebar-search::placeholder { color: var(--tui-hint); }
    #sidebar-search:focus { border-color: var(--tui-active); }

    #sidebar-tree {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0 20px;
    }


    .sidebar-entry {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 14px 4px 22px;
      cursor: pointer;
      font-size: 12px;
      color: var(--tui-symbol);
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      border-left: 2px solid transparent;
      transition: background .1s, border-color .1s;
    }
    .sidebar-entry:hover {
      background: rgba(120,160,220,0.08);
    }
    .sidebar-entry.active {
      background: rgba(120,160,220,0.13);
      border-left-color: var(--tui-active);
      color: var(--tui-active);
    }
    .sidebar-entry-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-entry-kind {
      font-size: 9.5px;
      color: var(--tui-kind);
      flex-shrink: 0;
    }

    /* namespace / class group */
    .sidebar-group > .sidebar-entry {
      padding-left: 14px;
      font-weight: 600;
    }
    .sidebar-group-members {
      overflow: hidden;
    }
    .sidebar-group-members.collapsed { display: none; }
    .sidebar-group-members .sidebar-entry {
      padding-left: 30px;
      font-size: 11.5px;
      color: var(--tui-brief);
    }
    .sidebar-group-members .sidebar-entry:hover { color: var(--tui-symbol); }
    .sidebar-group-members .sidebar-entry.active { color: var(--tui-active); }
    /* depth-3: members of a type inside a namespace */
    .sidebar-group-members .sidebar-group > .sidebar-entry {
      padding-left: 30px;
      font-size: 11.5px;
    }
    .sidebar-group-members .sidebar-group-members .sidebar-entry {
      padding-left: 44px;
      font-size: 11px;
    }
    .sidebar-group-toggle {
      font-size: 9px;
      color: var(--tui-hint);
      flex-shrink: 0;
      width: 10px;
    }

    /* ── Detail panel ──────────────────────────────────────────────────────── */
    #docs-detail {
      flex: 1;
      overflow-y: auto;
      padding: 28px 36px 60px;
      min-width: 0;
    }

    /* ── Symbol header ─────────────────────────────────────────────────────── */
    .detail-sym-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--tui-symbol);
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin: 0 0 4px;
    }
    .detail-kind-badge {
      font-size: 13px;
      font-weight: 400;
      color: var(--tui-kind);
    }
    .detail-brief {
      font-size: 13px;
      color: var(--tui-brief);
      margin: 4px 0 18px;
      line-height: 1.6;
    }

    /* ── Heading pills ─────────────────────────────────────────────────────── */
    .detail-body h1 {
      color: var(--h1-fg);
      background: var(--h1-bg);
      border-left: 3px solid var(--h1-fg);
      padding: 3px 14px;
      border-radius: 4px;
      display: inline-block;
      font-size: 15px;
      margin: 22px 0 10px;
    }
    .detail-body h2 {
      color: var(--h2-fg);
      background: var(--h2-bg);
      border-left: 3px solid var(--h2-fg);
      padding: 2px 12px;
      border-radius: 4px;
      display: inline-block;
      font-size: 13.5px;
      margin: 18px 0 8px;
    }
    .detail-body h3 {
      color: var(--h3-fg);
      background: var(--h3-bg);
      border-left: 3px solid var(--h3-fg);
      padding: 2px 10px;
      border-radius: 4px;
      display: inline-block;
      font-size: 12.5px;
      margin: 14px 0 6px;
    }
    .detail-body h4, .detail-body h5, .detail-body h6 {
      color: var(--h4-fg);
      background: var(--h4-bg);
      border-left: 3px solid var(--h4-fg);
      padding: 2px 10px;
      border-radius: 4px;
      display: inline-block;
      font-size: 12px;
      margin: 12px 0 6px;
    }

    .detail-body p {
      font-size: 13px;
      line-height: 1.7;
      color: rgb(200,210,220);
      margin: 8px 0;
    }

    .detail-body a {
      color: var(--tui-active);
      text-decoration: none;
    }
    .detail-body a:hover { text-decoration: underline; }

    .detail-body ul, .detail-body ol {
      font-size: 13px;
      line-height: 1.7;
      padding-left: 20px;
      color: rgb(200,210,220);
    }

    /* ── Code blocks ───────────────────────────────────────────────────────── */
    .code-block-wrap {
      margin: 12px 0;
    }
    .code-block-header {
      font-family: inherit;
      font-size: 11px;
      color: var(--tui-border);
      background: transparent;
      padding: 0 0 1px 2px;
      letter-spacing: 0.03em;
      user-select: none;
    }
    .detail-body pre, pre.tui-pre {
      background: rgb(15,17,24);
      border: 1px solid var(--tui-border);
      border-radius: 4px;
      padding: 12px 16px;
      overflow-x: auto;
      margin: 0;
      font-family: inherit;
      font-size: 12.5px;
      line-height: 1.6;
    }
    .detail-body pre code {
      background: transparent;
      padding: 0;
      font-size: inherit;
    }
    .detail-body code {
      background: rgb(22,24,33);
      border: 1px solid rgba(80,80,100,0.5);
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 12px;
      color: var(--tui-symbol);
      font-family: inherit;
    }

    /* ── Parameter / member table ──────────────────────────────────────────── */
    .param-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12.5px;
      margin: 10px 0 18px;
    }
    .param-table th {
      text-align: left;
      color: var(--tui-section);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 5px 10px;
      border-bottom: 1px solid var(--tui-border);
      font-weight: 600;
    }
    .param-table td {
      padding: 5px 10px;
      vertical-align: top;
      border-bottom: 1px solid rgba(80,80,100,0.3);
      color: rgb(200,210,220);
    }
    .param-table tr:last-child td { border-bottom: none; }
    .param-table .col-name {
      font-weight: 600;
      color: var(--tui-symbol);
      white-space: nowrap;
    }
    .param-table .col-type {
      color: var(--tui-kind);
      white-space: nowrap;
    }
    .param-table .col-desc { color: var(--tui-brief); }

    /* ── Section divider ───────────────────────────────────────────────────── */
    .detail-divider {
      border: none;
      border-top: 1px solid var(--tui-border);
      margin: 20px 0 16px;
    }
    .detail-section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--tui-section);
      margin: 16px 0 6px;
      font-weight: 700;
    }

    /* ── Returns / See also ────────────────────────────────────────────────── */
    .detail-returns {
      font-size: 12.5px;
      color: rgb(200,210,220);
      margin: 4px 0 14px;
      line-height: 1.6;
    }
    .see-also-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 4px 0 14px;
    }
    .see-also-link {
      color: var(--tui-active);
      font-size: 12px;
      text-decoration: none;
      border: 1px solid rgba(120,160,220,0.3);
      border-radius: 3px;
      padding: 2px 8px;
    }
    .see-also-link:hover {
      text-decoration: underline;
      border-color: var(--tui-active);
    }

    /* ── Index overview ────────────────────────────────────────────────────── */
    .overview-counts {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 18px 0 24px;
    }
    .count-card {
      background: var(--tui-surface);
      border: 1px solid var(--tui-border);
      border-radius: 4px;
      padding: 10px 18px;
      text-align: center;
      min-width: 80px;
    }
    .count-card-num {
      font-size: 22px;
      font-weight: 700;
      color: var(--tui-pkg);
      display: block;
    }
    .count-card-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--tui-hint);
      display: block;
      margin-top: 2px;
    }

    /* ── "Browse locally" callout ──────────────────────────────────────────── */
    .local-card {
      background: var(--tui-surface);
      border: 1px solid var(--tui-border);
      border-left: 3px solid var(--tui-active);
      border-radius: 4px;
      padding: 14px 18px;
      margin: 0 0 22px;
      font-size: 12.5px;
    }
    .local-card-title {
      font-weight: 700;
      color: var(--tui-symbol);
      margin: 0 0 6px;
      font-size: 13px;
    }
    .local-card-desc {
      color: var(--tui-brief);
      line-height: 1.6;
      margin: 0 0 10px;
    }
    .local-card-cmd {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--tui-bg);
      border: 1px solid var(--tui-border);
      border-radius: 3px;
      padding: 7px 12px;
    }
    .local-card-cmd span {
      flex: 1;
      color: var(--tui-symbol);
      font-size: 12.5px;
      user-select: all;
    }
    .copy-btn {
      background: none;
      border: 1px solid var(--tui-border);
      border-radius: 3px;
      color: var(--tui-hint);
      cursor: pointer;
      font-size: 10px;
      padding: 2px 7px;
      font-family: inherit;
      transition: color .12s, border-color .12s;
    }
    .copy-btn:hover { color: var(--tui-active); border-color: var(--tui-active); }

    /* ── Deprecated / warning / note banners ──────────────────────────────── */
    .tag-deprecated {
      background: rgba(224,108,117,0.1);
      border: 1px solid rgba(224,108,117,0.35);
      border-left: 3px solid rgb(224,108,117);
      border-radius: 4px;
      padding: 8px 14px;
      font-size: 12.5px;
      color: rgb(224,108,117);
      margin: 0 0 16px;
    }
    .tag-warning {
      background: rgba(229,192,123,0.08);
      border: 1px solid rgba(229,192,123,0.3);
      border-left: 3px solid rgb(229,192,123);
      border-radius: 4px;
      padding: 8px 14px;
      font-size: 12.5px;
      color: rgb(229,192,123);
      margin: 6px 0;
    }
    .tag-note {
      background: rgba(97,175,239,0.07);
      border: 1px solid rgba(97,175,239,0.25);
      border-left: 3px solid rgb(97,175,239);
      border-radius: 4px;
      padding: 8px 14px;
      font-size: 12.5px;
      color: rgb(180,200,220);
      margin: 6px 0;
    }
    .tag-since {
      display: inline-block;
      background: rgba(130,170,130,0.12);
      border: 1px solid rgba(130,170,130,0.25);
      border-radius: 3px;
      padding: 1px 8px;
      font-size: 11px;
      color: var(--tui-kind);
      margin: 0 0 14px;
    }

    /* ── No docs state ─────────────────────────────────────────────────────── */
    .no-docs-msg {
      font-size: 13px;
      color: var(--tui-hint);
      margin: 20px 0;
      line-height: 1.7;
    }

    /* ── Loading / error ───────────────────────────────────────────────────── */
    .docs-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--tui-hint);
      font-size: 13px;
      gap: 10px;
    }
    .docs-error {
      color: #e06c75;
      font-size: 13px;
      margin: 24px 0;
      background: rgba(224,108,117,0.08);
      border: 1px solid rgba(224,108,117,0.3);
      border-radius: 4px;
      padding: 12px 16px;
    }

    /* ── Resize handle ─────────────────────────────────────────────────────── */
    #sidebar-resize {
      width: 4px;
      cursor: col-resize;
      background: transparent;
      flex-shrink: 0;
      transition: background .15s;
    }
    #sidebar-resize:hover { background: var(--tui-active); }

    /* ── Mobile ────────────────────────────────────────────────────────────── */
    @media (max-width: 700px) {
      #docs-sidebar { display: none; }
      #docs-detail  { padding: 20px 16px 50px; }
    }
  </style>
</head>

<script>
'use strict';

/* Map fence lang tags → highlight.js language names */
const HLJS_LANG = {
  c:'c', cpp:'cpp', 'c++':'cpp', cc:'cpp', cxx:'cpp',
  rust:'rust', rs:'rust',
  python:'python', py:'python',
  js:'javascript', javascript:'javascript',
  ts:'typescript', typescript:'typescript',
  go:'go', java:'java', kotlin:'kotlin', swift:'swift',
  fortran:'fortran', f90:'fortran', f95:'fortran',
  d:'d', ada:'ada', zig:'zig',
  bash:'bash', sh:'bash', shell:'bash',
  toml:'toml', yaml:'yaml', json:'json', xml:'xml',
  cmake:'cmake', makefile:'makefile',
};

function hlCode(code, lang) {
  if (typeof hljs === 'undefined') return esc(code);
  const l = HLJS_LANG[lang?.toLowerCase()] ?? null;
  try {
    return l
      ? hljs.highlight(code, { language: l, ignoreIllegals: true }).value
      : hljs.highlightAuto(code, Object.values(HLJS_LANG)).value;
  } catch { return esc(code); }
}

/* ── Globals ────────────────────────────────────────────────────────────────── */
const pathParts = location.pathname.split('/').filter(Boolean);
const pkgName   = pathParts[1] ?? '';
document.title  = `${pkgName} — Docs`;

/* Item kind is already the display label from DocKind::label() — lowercase short form */
const KIND_LABEL = {
  fn:'fn', sub:'sub', macro:'macro',
  class:'class', struct:'struct', iface:'iface',
  enum:'enum', type:'type', mod:'ns',
  var:'var', '?':'?',
};

const TYPE_KINDS = new Set(['class','struct','iface','enum','type']);
const NS_KINDS   = new Set(['mod']);
const FN_KINDS   = new Set(['fn','sub','macro']);

let docsData  = null;  /* full JSON from /docs endpoint */
let pkgInfo   = null;  /* package metadata */
let allItems  = [];    /* flat list of doc items */

/* ── Helpers ────────────────────────────────────────────────────────────────── */

function kindLabel(k) { return KIND_LABEL[k] ?? k; }

function slug(name) {
  return name.replace(/[^a-zA-Z0-9_:.-]/g, '_');
}

function shortName(q) {
  const p = q.split(/::|\./);
  return p[p.length - 1] ?? q;
}

function kindBadge(kind) {
  return `<span class="sidebar-entry-kind">[${esc(kindLabel(kind))}]</span>`;
}

function detailKindBadge(kind) {
  return `<span class="detail-kind-badge">[${esc(kindLabel(kind))}]</span>`;
}

/* Very small markdown-to-HTML converter (headings, bold, inline-code, fences, paragraphs) */
function renderMarkdown(md) {
  if (!md) return '';
  const lines = md.split('\n');
  const out = [];
  let inFence = false, fenceLang = '', fenceLines = [];

  function flushFence() {
    const lang = fenceLang || '';
    const dashes = '─'.repeat(Math.max(2, 30 - lang.length));
    const header = lang
      ? `<div class="code-block-header">─── ${esc(lang)} ${dashes}</div>`
      : `<div class="code-block-header">─────────────────────────────────</div>`;
    const highlighted = hlCode(fenceLines.join('\n'), lang);
    out.push(`<div class="code-block-wrap">${header}<pre><code>${highlighted}</code></pre></div>`);
    fenceLines = [];
    fenceLang = '';
    inFence = false;
  }

  function inlineFormat(line) {
    return line
      .replace(/`([^`]+)`/g, (_, c) => `<code>${esc(c)}</code>`)
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/\*([^*]+)\*/g, '<em>$1</em>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, text, href) =>
        `<a href="${esc(href)}">${esc(text)}</a>`);
  }

  let pBuf = [];
  function flushP() {
    if (pBuf.length) {
      out.push(`<p>${pBuf.map(inlineFormat).join(' ')}</p>`);
      pBuf = [];
    }
  }

  for (const raw of lines) {
    if (inFence) {
      if (raw.startsWith('```') || raw.startsWith('~~~')) { flushP(); flushFence(); }
      else fenceLines.push(raw);
      continue;
    }
    const m = raw.match(/^(```|~~~)(\w*)/);
    if (m) { flushP(); inFence = true; fenceLang = m[2] || ''; continue; }

    const hm = raw.match(/^(#{1,6})\s+(.*)/);
    if (hm) {
      flushP();
      const lvl = hm[1].length;
      const tag = `h${Math.min(lvl, 6)}`;
      out.push(`<${tag}>${inlineFormat(hm[2])}</${tag}>`);
      continue;
    }

    const lm = raw.match(/^(\s*[-*+]|\s*\d+\.)\s+(.*)/);
    if (lm) { flushP(); out.push(`<li>${inlineFormat(lm[2])}</li>`); continue; }

    if (raw.trim() === '') { flushP(); continue; }
    pBuf.push(raw);
  }
  flushP();
  if (inFence) flushFence();

  return out.join('\n');
}

/* ── Sidebar — freight-doc grouping ─────────────────────────────────────────── */

/**
 * Derive namespace prefixes from item names, exactly mirroring
 * derive_namespaces() in browser.rs.
 * Module items contribute their name directly; other qualified names
 * contribute every non-leaf prefix, skipping prefixes that are class names.
 */
function deriveNamespaces(items) {
  const classNames = new Set(
    items
      .filter(i => TYPE_KINDS.has(i.kind))
      .map(i => i.name.includes('::') ? i.name.split('::').at(-1)
               : i.name.includes('.') ? i.name.split('.').at(-1)
               : i.name)
  );
  const set = new Set();
  for (const item of items) {
    if (item.meta?.parent) continue;
    if (NS_KINDS.has(item.kind) && item.name) { set.add(item.name); continue; }
    for (const sep of ['::', '.']) {
      const parts = item.name.split(sep);
      if (parts.length > 1) {
        for (let i = 1; i < parts.length; i++) {
          const ns = parts.slice(0, i).join(sep);
          const simple = ns.includes('::') ? ns.split('::').at(-1)
                       : ns.includes('.')  ? ns.split('.').at(-1)
                       : ns;
          if (ns && !classNames.has(simple)) set.add(ns);
        }
        break;
      }
    }
  }
  return [...set].sort();
}

/** Items whose name starts with `ns::` or `ns.` (not Module, not class members). */
function itemsInNs(items, ns) {
  const pfxCC  = ns + '::';
  const pfxDot = ns + '.';
  return items.filter(i =>
    !NS_KINDS.has(i.kind) &&
    !i.meta?.parent &&
    (i.name.startsWith(pfxCC) || i.name.startsWith(pfxDot))
  );
}

/** True if item's qualified name sits inside one of `namespaces`. */
function isInNamespace(item, namespaces) {
  for (const sep of ['::', '.']) {
    const idx = item.name.lastIndexOf(sep);
    if (idx > 0 && namespaces.includes(item.name.slice(0, idx))) return true;
  }
  return false;
}

/** True if item has children (class members or namespace items) in `items`. */
function hasMembers(items, item) {
  const simple = item.name.includes('::') ? item.name.split('::').at(-1)
               : item.name.includes('.')  ? item.name.split('.').at(-1)
               : item.name;
  return items.some(i => i.meta?.parent === simple || i.meta?.parent === item.name);
}

function buildSidebar(items, filter) {
  const q    = (filter ?? '').toLowerCase();
  const tree = document.getElementById('sidebar-tree');
  if (!items.length) {
    tree.innerHTML = '<div style="padding:14px;font-size:12px;color:var(--tui-hint);">No symbols.</div>';
    return;
  }

  const src = q ? items.filter(i => i.name?.toLowerCase().includes(q)) : items;
  const cur  = location.hash.slice(1);
  const namespaces = deriveNamespaces(src);

  /* helper: render a single leaf entry (deduped by slug for overloads) */
  function entry(it, indent) {
    const s  = slug(it.name);
    const ac = cur === s ? ' active' : '';
    const pad = indent ? ' style="padding-left:' + indent + 'px"' : '';
    const overloadCount = src.filter(x => slug(x.name) === s).length;
    const overloadBadge = overloadCount > 1
      ? `<span style="font-size:9px;color:var(--tui-hint);flex-shrink:0">×${overloadCount}</span>`
      : '';
    return `<a class="sidebar-entry${ac}" data-hash="${esc(s)}"${pad}>
      <span class="sidebar-entry-name">${esc(shortName(it.name))}</span>
      ${kindBadge(it.kind)}${overloadBadge}
    </a>`;
  }

  /* For the sidebar, deduplicate items by slug so overloads show as one entry. */
  function dedupBySlug(items) {
    const seen = new Set();
    return items.filter(i => {
      const s = slug(i.name);
      if (seen.has(s)) return false;
      seen.add(s);
      return true;
    });
  }

  /**
   * Collapsible group. childHtml is pre-rendered HTML for the body.
   * isOpen: force open if a descendant is currently active.
   */
  function group(header, headHash, childHtml, isOpen) {
    const ac     = cur === headHash ? ' active' : '';
    const openCls = isOpen ? ' open' : '';
    const cm      = isOpen ? '' : ' collapsed';
    const arrow   = isOpen ? '▼' : '▶';
    return `<div class="sidebar-group${openCls}">
      <a class="sidebar-entry${ac}" data-hash="${esc(headHash)}">
        <span class="sidebar-group-toggle">${arrow}</span>
        ${header}
      </a>
      <div class="sidebar-group-members${cm}">${childHtml}</div>
    </div>`;
  }

  /**
   * Render children of a namespace. Type items that have class members
   * get a nested expandable sub-group (depth 2); everything else is a leaf.
   */
  function nsChildrenHtml(children) {
    return dedupBySlug(children).map(c => {
      if (TYPE_KINDS.has(c.kind)) {
        const members = dedupBySlug(src
          .filter(m => m.meta?.parent === shortName(c.name) || m.meta?.parent === c.name)
          .sort((a, b) => shortName(a.name).localeCompare(shortName(b.name))));
        if (members.length) {
          const membersHtml = members.map(m => entry(m, 44)).join('');
          const label = `<span class="sidebar-entry-name">${esc(shortName(c.name))}</span>${kindBadge(c.kind)}`;
          const anyMemberActive = members.some(m => slug(m.name) === cur);
          return group(label, slug(c.name), membersHtml, anyMemberActive || cur === slug(c.name));
        }
      }
      return entry(c, 30);
    }).join('');
  }

  /* helper: collapsible section */
  function section(title, body) {
    return `<div class="sidebar-section-hdr" data-section="${esc(title)}">${esc(title)}</div>
            <div class="sidebar-section-body" data-section-body="${esc(title)}">${body}</div>`;
  }

  let html = '';

  /* Overview link */
  html += `<a class="sidebar-entry${!cur || cur === 'index' ? ' active' : ''}" data-hash="index">
    <span class="sidebar-entry-name">Overview</span>
  </a>`;

  /* 1. Type items not in any namespace — expandable if they have members */
  const typeItems = src
    .filter(i => TYPE_KINDS.has(i.kind) && !i.meta?.parent && !isInNamespace(i, namespaces))
    .sort((a, b) => shortName(a.name).localeCompare(shortName(b.name)));

  for (const it of typeItems) {
    const children = src
      .filter(c => c.meta?.parent === shortName(it.name) || c.meta?.parent === it.name)
      .sort((a, b) => shortName(a.name).localeCompare(shortName(b.name)));
    if (children.length) {
      const anyActive = children.some(c => slug(c.name) === cur);
      html += group(
        `<span class="sidebar-entry-name">${esc(shortName(it.name))}</span>${kindBadge(it.kind)}`,
        slug(it.name),
        children.map(c => entry(c, 30)).join(''),
        anyActive || cur === slug(it.name)
      );
    } else {
      html += entry(it, 0);
    }
  }

  /* 2. Namespaces — expandable, showing their members */
  for (const ns of namespaces) {
    const nsItem   = src.find(i => i.name === ns && NS_KINDS.has(i.kind));
    const children = itemsInNs(src, ns)
      .sort((a, b) => shortName(a.name).localeCompare(shortName(b.name)));
    const headHash = nsItem ? slug(nsItem.name) : slug(ns);
    const label    = `<span class="sidebar-entry-name">${esc(ns)}</span>${kindBadge('Module')}`;
    if (!children.length) {
      const ac = cur === headHash ? ' active' : '';
      html += `<a class="sidebar-entry${ac}" data-hash="${esc(headHash)}">${label}</a>`;
    } else {
      const anyActive = children.some(c => slug(c.name) === cur
        || src.filter(m => m.meta?.parent === shortName(c.name)).some(m => slug(m.name) === cur));
      html += group(label, headHash, nsChildrenHtml(children), anyActive || cur === headHash);
    }
  }

  /* 3. Free symbols — not type, not namespace, not a class member, not in a namespace */
  const free = dedupBySlug(src
    .filter(i => !TYPE_KINDS.has(i.kind) && !NS_KINDS.has(i.kind)
              && !i.meta?.parent && !isInNamespace(i, namespaces))
    .sort((a, b) => shortName(a.name).localeCompare(shortName(b.name))));

  for (const it of free) {
    html += entry(it, 0);
  }

  tree.innerHTML = html;

  /* ── Event wiring ──────────────────────────────────────────────────────── */

  tree.querySelectorAll('.sidebar-entry[data-hash]').forEach(el => {
    el.addEventListener('click', e => {
      e.preventDefault();
      navigateTo(el.dataset.hash);
      el.closest('.sidebar-group-members')?.classList.remove('collapsed');
    });
  });

  tree.querySelectorAll('.sidebar-group > .sidebar-entry').forEach(el => {
    el.addEventListener('click', () => {
      const grp     = el.closest('.sidebar-group');
      const members = grp?.querySelector(':scope > .sidebar-group-members');
      const toggle  = el.querySelector('.sidebar-group-toggle');
      if (members) {
        const opening = members.classList.contains('collapsed');
        members.classList.toggle('collapsed');
        grp.classList.toggle('open');
        if (toggle) toggle.textContent = opening ? '▼' : '▶';
      }
    });
  });
}

/* ── Tag helpers ────────────────────────────────────────────────────────────── */

/**
 * Normalise a DocTag.kind to a lowercase string.
 *
 * The registry serialises TagKind using its Debug impl, so the wire format is:
 *   plain variants → "Param", "Return", "Note", …
 *   Other variant  → `Other("tparam")`, `Other("throws std::bad_alloc")`, …
 */
function tagKind(tag) {
  if (!tag?.kind) return '';
  const k = String(tag.kind);
  const m = k.match(/^Other\("(.+)"\)$/);
  if (m) return m[1].toLowerCase();
  return k.toLowerCase();
}

function tagsOf(item, kind) {
  return (item.tags ?? []).filter(t => tagKind(t) === kind);
}

/**
 * Map DocLanguage::label() strings (the human-readable form stored in the JSON
 * "lang" field) to a highlight.js language tag.
 */
const LANG_MAP = {
  'C':          { hl: 'c'          },
  'C++':        { hl: 'cpp'        },
  'Rust':       { hl: 'rust'       },
  'Fortran':    { hl: 'fortran'    },
  'D':          { hl: 'd'          },
  'Ada':        { hl: 'ada'        },
  'Java':       { hl: 'java'       },
  'Go':         { hl: 'go'         },
  'Zig':        { hl: 'plaintext'  },
  'Kotlin':     { hl: 'kotlin'     },
  'Swift':      { hl: 'swift'      },
  'Python':     { hl: 'python'     },
  'TypeScript': { hl: 'typescript' },
  'JavaScript': { hl: 'javascript' },
  'C#':         { hl: 'csharp'     },
  'PHP':        { hl: 'php'        },
  'Ruby':       { hl: 'ruby'       },
  'Lua':        { hl: 'lua'        },
  'R':          { hl: 'r'          },
  'Haskell':    { hl: 'haskell'    },
};

function langInfo(langLabel) {
  const hl = LANG_MAP[langLabel]?.hl ?? null;
  return { hl, label: langLabel ?? '' };
}

function codeBlock(code, langLabel) {
  const { hl, label } = langInfo(langLabel);
  const dashes = '─'.repeat(Math.max(2, 30 - label.length));
  const header = label
    ? `<div class="code-block-header">─── ${esc(label)} ${dashes}</div>`
    : `<div class="code-block-header">─────────────────────────────────</div>`;
  return `<div class="code-block-wrap">${header}<pre><code>${hlCode(code, hl)}</code></pre></div>`;
}

function sectionLabel(text) {
  return `<div class="detail-section-label">${esc(text)}</div>`;
}

function divider() { return `<hr class="detail-divider">`; }

/* ── Detail rendering ───────────────────────────────────────────────────────── */

function renderIndex() {
  const detail = document.getElementById('docs-detail');
  const pkg = pkgInfo;
  const items = allItems;

  const counts = {
    types: items.filter(i => TYPE_KINDS.has(i.kind)).length,
    fns:   items.filter(i => FN_KINDS.has(i.kind)).length,
    vars:  items.filter(i => i.kind === 'Variable').length,
    ns:    items.filter(i => NS_KINDS.has(i.kind)).length,
  };

  const cmdText = `freight doc ${pkgName}`;
  let html = '';

  /* Package header */
  if (pkg) {
    html += `<div style="margin-bottom:20px">
      <div style="font-size:22px;font-weight:700;color:var(--tui-pkg);margin-bottom:4px">
        ${esc(pkg.name)}<span style="font-size:14px;font-weight:400;color:var(--tui-hint);margin-left:10px">v${esc(pkg.latest ?? '')}</span>
      </div>
      <div style="font-size:12px;color:var(--tui-hint)">
        <a href="/packages/${esc(pkg.name)}" style="color:var(--tui-hint);text-decoration:none">← Back to package</a>
      </div>
    </div>`;
  }

  /* TUI callout */
  html += `<div class="local-card">
    <div class="local-card-title">Interactive Documentation</div>
    <p class="local-card-desc">The best experience is the <code>${esc('freight doc')}</code> TUI browser —
    syntax highlighting, cross-references, and full-text search directly from source.</p>
    <div class="local-card-cmd">
      <span id="cmd-text">${esc(cmdText)}</span>
      <button class="copy-btn" id="copy-btn">Copy</button>
    </div>
  </div>`;

  if (!items.length) {
    html += `<p class="no-docs-msg">No symbol index uploaded. Run <code>freight doc ${esc(pkgName)}</code> locally to browse the source.</p>`;
    detail.innerHTML = html;
    wireLocalCard(cmdText);
    return;
  }

  /* Count cards */
  html += `<div class="overview-counts">`;
  if (counts.types)  html += countCard(counts.types, 'Types');
  if (counts.fns)    html += countCard(counts.fns, 'Functions');
  if (counts.vars)   html += countCard(counts.vars, 'Variables');
  if (counts.ns)     html += countCard(counts.ns, 'Namespaces');
  html += `</div>`;

  /* README — from docs data or package info */
  const readme = docsData?.readme ?? pkgInfo?.readme;
  if (readme) {
    html += sectionLabel('README');
    html += `<div class="detail-body">${renderMarkdown(readme)}</div>`;
  }

  detail.innerHTML = html;
  wireLocalCard(cmdText);
  markSidebarActive('index');
}

function countCard(n, label) {
  return `<div class="count-card"><span class="count-card-num">${n}</span><span class="count-card-label">${esc(label)}</span></div>`;
}

function wireLocalCard(cmdText) {
  const btn = document.getElementById('copy-btn');
  if (btn) {
    btn.addEventListener('click', () => {
      navigator.clipboard.writeText(cmdText).then(() => {
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy'; }, 1800);
      }).catch(() => {});
    });
  }
}

/** Render one or more items sharing the same slug (overloads). */
function renderSymbols(items) {
  if (items.length === 1) {
    renderSymbol(items[0]);
    return;
  }
  const detail = document.getElementById('docs-detail');
  let html = '';
  items.forEach((item, idx) => {
    if (idx > 0) {
      html += `<div style="border-top:2px solid var(--tui-border);margin:32px 0 24px;"></div>`;
    }
    html += symbolHtml(item);
  });
  detail.innerHTML = html;
  detail.querySelectorAll('a[href^="#"]').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      navigateTo(a.getAttribute('href').slice(1));
    });
  });
  markSidebarActive(slug(items[0].name));
}

function symbolHtml(item) {
  const langVariant = item.lang ?? item.language ?? 'C++';
  const tags = item.tags ?? [];

  const params     = tagsOf(item, 'param');
  const tparams    = tagsOf(item, 'tparam');
  const returns    = tagsOf(item, 'return');
  const retvals    = tagsOf(item, 'retval');
  const throws     = tagsOf(item, 'throws').concat(tagsOf(item, 'throw').concat(tagsOf(item, 'exception')));
  const notes      = tagsOf(item, 'note');
  const warnings   = tagsOf(item, 'warning');
  const examples   = tagsOf(item, 'example');
  const seeAlso    = tagsOf(item, 'see');
  const sinceTag   = tagsOf(item, 'since');
  const deprecated = tagsOf(item, 'deprecated');

  let html = '';

  /* Deprecated banner */
  if (deprecated.length) {
    html += `<div class="tag-deprecated">⚠ Deprecated — ${esc(deprecated[0].text)}</div>`;
  }

  /* Symbol header */
  html += `<div class="detail-sym-name">${esc(item.name)}${detailKindBadge(item.kind)}</div>`;

  /* Since badge */
  if (sinceTag.length) {
    html += `<span class="tag-since">since ${esc(sinceTag[0].text)}</span>`;
  }

  /* Brief */
  if (item.brief) {
    html += `<div class="detail-brief">${esc(item.brief)}</div>`;
  }

  /* Signature */
  if (item.signature) {
    html += codeBlock(item.signature, langVariant);
  }

  /* Body markdown */
  if (item.body) {
    html += divider();
    html += `<div class="detail-body">${renderMarkdown(item.body)}</div>`;
  }

  /* Template parameters */
  if (tparams.length) {
    html += divider() + sectionLabel('Template Parameters');
    html += `<table class="param-table"><thead><tr><th>Name</th><th>Description</th></tr></thead><tbody>`;
    for (const p of tparams) {
      html += `<tr><td class="col-name">${esc(p.name ?? '')}</td>
               <td class="col-desc">${esc(p.text)}</td></tr>`;
    }
    html += `</tbody></table>`;
  }

  /* Parameters */
  if (params.length) {
    html += divider() + sectionLabel('Parameters');
    html += `<table class="param-table"><thead><tr><th>Name</th><th>Description</th></tr></thead><tbody>`;
    for (const p of params) {
      html += `<tr><td class="col-name">${esc(p.name ?? '')}</td>
               <td class="col-desc">${esc(p.text)}</td></tr>`;
    }
    html += `</tbody></table>`;
  }

  /* Returns */
  if (returns.length) {
    html += divider() + sectionLabel('Returns');
    for (const r of returns) {
      html += `<div class="detail-returns">${esc(r.text)}</div>`;
    }
  }

  /* Retvals — named return value table */
  if (retvals.length) {
    html += divider() + sectionLabel('Return Values');
    html += `<table class="param-table"><thead><tr><th>Value</th><th>Description</th></tr></thead><tbody>`;
    for (const r of retvals) {
      html += `<tr><td class="col-name">${esc(r.name ?? '')}</td>
               <td class="col-desc">${esc(r.text)}</td></tr>`;
    }
    html += `</tbody></table>`;
  }

  /* Throws */
  if (throws.length) {
    html += divider() + sectionLabel('Throws');
    html += `<table class="param-table"><thead><tr><th>Exception</th><th>Condition</th></tr></thead><tbody>`;
    for (const t of throws) {
      html += `<tr><td class="col-name">${esc(t.name ?? '')}</td>
               <td class="col-desc">${esc(t.text)}</td></tr>`;
    }
    html += `</tbody></table>`;
  }

  /* Notes */
  for (const n of notes) {
    html += `<div class="tag-note"><strong>Note:</strong> ${esc(n.text)}</div>`;
  }

  /* Warnings */
  for (const w of warnings) {
    html += `<div class="tag-warning"><strong>Warning:</strong> ${esc(w.text)}</div>`;
  }

  /* Examples */
  if (examples.length) {
    html += divider() + sectionLabel('Examples');
    for (const ex of examples) {
      const t = ex.text.trim();
      // Single-line fence: ```lang code``` — extract lang + code directly.
      const singleLine = t.match(/^(?:```|~~~)(\w*)\s+([\s\S]+?)\s*(?:```|~~~)$/);
      if (singleLine) {
        html += codeBlock(singleLine[2], singleLine[1] || langVariant);
      } else if (t.startsWith('```') || t.startsWith('~~~')) {
        // Multi-line fence — let renderMarkdown handle it.
        html += `<div class="detail-body">${renderMarkdown(t)}</div>`;
      } else {
        html += codeBlock(t, langVariant);
      }
    }
  }

  /* Members — only for type items (class/struct/enum/…), never for functions */
  if (TYPE_KINDS.has(item.kind)) {
    const members = allItems.filter(c =>
      c.meta?.parent === shortName(item.name) || c.meta?.parent === item.name
    ).sort((a, b) => shortName(a.name).localeCompare(shortName(b.name)));
    if (members.length) {
      html += divider() + sectionLabel('Members');
      // Deduplicate by slug so overloaded members appear once in the table.
      const seen = new Set();
      html += `<table class="param-table"><thead><tr><th>Name</th><th>Kind</th><th>Description</th></tr></thead><tbody>`;
      for (const m of members) {
        const s = slug(m.name);
        const overloads = members.filter(x => slug(x.name) === s);
        if (seen.has(s)) continue;
        seen.add(s);
        const suffix = overloads.length > 1 ? ` <span style="color:var(--tui-hint);font-size:10px">[×${overloads.length}]</span>` : '';
        html += `<tr>
          <td class="col-name"><a class="see-also-link" href="#${esc(s)}" style="border:none;padding:0">${esc(shortName(m.name))}</a>${suffix}</td>
          <td class="col-type">[${esc(kindLabel(m.kind))}]</td>
          <td class="col-desc">${esc(m.brief ?? '')}</td></tr>`;
      }
      html += `</tbody></table>`;
    }
  }

  /* See also */
  if (seeAlso.length) {
    html += divider() + sectionLabel('See Also');
    html += `<div class="see-also-list">`;
    for (const s of seeAlso) {
      const name = s.text.trim();
      const target = allItems.find(i => i.name === name || shortName(i.name) === name);
      if (target) {
        html += `<a class="see-also-link" href="#${esc(slug(target.name))}">${esc(name)}</a>`;
      } else {
        html += `<span class="see-also-link" style="cursor:default;opacity:.6">${esc(name)}</span>`;
      }
    }
    html += `</div>`;
  }

  return html;
}

function renderSymbol(item) {
  const detail = document.getElementById('docs-detail');
  detail.innerHTML = symbolHtml(item);
  detail.querySelectorAll('a[href^="#"]').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      navigateTo(a.getAttribute('href').slice(1));
    });
  });
  markSidebarActive(slug(item.name));
}

function renderNotFound(hash) {
  const detail = document.getElementById('docs-detail');
  detail.innerHTML = `<p class="no-docs-msg">Symbol <code>${esc(hash)}</code> not found.</p>`;
}

/* ── Routing ────────────────────────────────────────────────────────────────── */

function navigateTo(hash) {
  history.pushState(null, '', `#${hash}`);
  route(hash);
}

function route(hash) {
  if (!hash || hash === 'index') {
    renderIndex();
    return;
  }
  /* Collect all items sharing this slug (handles overloads). */
  const items = allItems.filter(i => slug(i.name) === hash);
  if (items.length) {
    renderSymbols(items);
  } else {
    renderNotFound(hash);
  }
}

function markSidebarActive(hash) {
  document.querySelectorAll('.sidebar-entry').forEach(el => {
    el.classList.toggle('active', el.dataset.hash === hash);
  });
}

/* ── Sidebar resize ─────────────────────────────────────────────────────────── */

(function() {
  const handle = document.getElementById('sidebar-resize');
  const sidebar = document.getElementById('docs-sidebar');
  let dragging = false, startX = 0, startW = 0;

  handle.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startW = sidebar.offsetWidth;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const w = Math.max(160, Math.min(480, startW + e.clientX - startX));
    sidebar.style.width = `${w}px`;
  });
  document.addEventListener('mouseup', () => {
    dragging = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

/* ── Main ───────────────────────────────────────────────────────────────────── */

document.addEventListener('DOMContentLoaded', async () => {
  /* Sidebar search filter */
  document.getElementById('sidebar-search').addEventListener('input', e => {
    buildSidebar(allItems, e.target.value);
  });

  /* Hash routing */
  window.addEventListener('popstate', () => {
    route(location.hash.slice(1));
  });

  try {
    const [pkg, docsResp, ownersResp] = await Promise.all([
      API.getPackage(pkgName),
      fetch(`/api/v1/packages/${encodeURIComponent(pkgName)}/latest/docs`),
      API.getOwners(pkgName),
    ]);
    pkgInfo = pkg;

    /* Update sidebar header */
    if (pkg) {
      document.getElementById('sidebar-pkg-name').textContent = pkg.name;
      document.getElementById('sidebar-pkg-ver').textContent  = `v${pkg.latest ?? ''}`;

      /* Source link — upstream_url lives in the latest version entry */
      const latestVer = pkg.versions?.find(v => v.version === pkg.latest) ?? pkg.versions?.[0];
      const src = repoUrl(latestVer?.upstream_url ?? '');
      if (src) {
        document.getElementById('sidebar-source').innerHTML =
          `<div class="sidebar-meta-row">
             <span class="sidebar-meta-label">source</span>
             <a href="${esc(src)}" target="_blank" rel="noopener">${esc(repoLabel(src))} ↗</a>
           </div>`;
      }

      /* Owners — API returns { users: [{ id, login }, …] } */
      const owners = ownersResp?.users ?? ownersResp?.owners ?? [];
      if (owners.length) {
        const chips = owners.map(o => {
          const name = typeof o === 'string' ? o : (o.login ?? o.username ?? o.name ?? '?');
          return `<a href="/users/${esc(name)}" class="sidebar-owner-chip">${esc(name)}</a>`;
        }).join('');
        document.getElementById('sidebar-owners').innerHTML =
          `<div class="sidebar-meta-row" style="flex-wrap:wrap;gap:4px;margin-top:5px">${chips}</div>`;
      }

      document.getElementById('sidebar-back').innerHTML =
        `<a href="/packages/${esc(pkg.name)}">← back to package</a>`;
    } else {
      document.getElementById('sidebar-pkg-name').textContent = pkgName;
    }

    /* Fetch docs */
    if (docsResp.ok) {
      docsData = await docsResp.json();
    } else if (pkg?.latest) {
      const r2 = await fetch(`/api/v1/packages/${encodeURIComponent(pkgName)}/${encodeURIComponent(pkg.latest)}/docs`);
      if (r2.ok) docsData = await r2.json();
    }

    allItems = (docsData?.items ?? []).filter(i => i.name);

    /* Build sidebar */
    buildSidebar(allItems, '');

    /* Initial route */
    route(location.hash.slice(1));

  } catch (err) {
    document.getElementById('sidebar-pkg-name').textContent = pkgName;
    document.getElementById('docs-detail').innerHTML =
      `<div class="docs-error">Failed to load documentation: ${esc(String(err.message ?? err))}</div>
       <p class="no-docs-msg">Try running <code>freight doc ${esc(pkgName)}</code> locally.</p>`;
  }
});
</script>
</body>
</html>
