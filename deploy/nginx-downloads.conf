# nginx configuration for the freight download server.
#
# Serves the /data/tarballs directory as static files.
# Mount this at /etc/nginx/conf.d/default.conf inside the nginx container.
#
# URL pattern: /{name}/{version}/{name}-{version}.tar.gz
# Storage layout: /data/tarballs/{name}/{version}/{name}-{version}.tar.gz
#
# The registry's FREIGHT_DOWNLOAD_URL should point to the base URL of this
# server, e.g. https://downloads.freight.example.com

server {
    listen 80;
    server_name _;

    # Tarballs are under /data/tarballs; expose them at the root URL.
    root /data/tarballs;

    # Only GET and HEAD are needed — this is a read-only file server.
    limit_except GET HEAD { deny all; }

    location / {
        # Disable directory listing.
        autoindex off;

        # Let nginx handle the If-Modified-Since / ETag headers automatically.
        # Clients (and CDNs in front of this) can cache aggressively — tarballs
        # are immutable once published.
        add_header Cache-Control "public, max-age=31536000, immutable";

        # Pass the filename in Content-Disposition so browsers download correctly.
        add_header Content-Disposition 'attachment';

        # nginx returns 404 directly for missing files; no need to proxy elsewhere.
        try_files $uri =404;
    }

    # Health check endpoint for load-balancers / Docker healthchecks.
    location /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
