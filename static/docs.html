<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docs — Freight Registry</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    /* ── Docs layout ──────────────────────────────────────────────────────── */
    body { flex-direction: column; }

    .docs-shell {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* Sidebar */
    .docs-sidebar {
      width: 260px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px 0;
      position: sticky;
      top: 56px;
      height: calc(100vh - 56px);
    }

    .docs-sidebar-search {
      padding: 0 12px 12px;
    }
    .docs-sidebar-search input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      padding: 6px 10px;
      outline: none;
    }
    .docs-sidebar-search input:focus { border-color: var(--accent); }

    .docs-sidebar-group { margin-bottom: 4px; }

    .docs-sidebar-group-header {
      padding: 4px 14px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      user-select: none;
    }

    .docs-sidebar-item {
      display: block;
      padding: 5px 14px 5px 20px;
      font-size: 13px;
      color: var(--text);
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-left: 2px solid transparent;
      cursor: pointer;
    }
    .docs-sidebar-item:hover  { background: rgba(255,255,255,.04); text-decoration: none; }
    .docs-sidebar-item.active { border-left-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    .docs-sidebar-badge {
      display: inline-block;
      font-size: 10px;
      font-family: var(--font-mono);
      background: var(--code-bg);
      color: var(--muted);
      border-radius: 3px;
      padding: 1px 4px;
      margin-right: 6px;
      flex-shrink: 0;
    }

    /* Main content */
    .docs-main {
      flex: 1;
      overflow-y: auto;
      padding: 32px 40px;
      max-width: 900px;
    }

    .docs-header {
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .docs-header h1 { margin: 0 0 4px; font-size: 1.6rem; }
    .docs-header-meta { color: var(--muted); font-size: 13px; }
    .docs-header-meta a { color: var(--muted); }
    .docs-header-meta a:hover { color: var(--accent); }

    /* Symbol detail */
    .symbol-detail { margin-bottom: 48px; }

    .symbol-name {
      font-size: 1.2rem;
      font-weight: 700;
      margin: 0 0 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .symbol-sig {
      font-family: var(--font-mono);
      font-size: 13px;
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      margin: 8px 0 12px;
      overflow-x: auto;
      white-space: pre;
    }

    .symbol-brief { margin: 0 0 8px; }

    .symbol-body {
      color: var(--text);
      margin: 0 0 12px;
      white-space: pre-wrap;
    }

    .symbol-tags { margin-top: 12px; }

    .symbol-tag {
      margin-bottom: 8px;
    }
    .symbol-tag-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }
    .symbol-tag-params { display: flex; flex-direction: column; gap: 4px; }
    .symbol-tag-param {
      display: flex;
      gap: 10px;
      font-size: 13px;
    }
    .symbol-tag-param-name {
      font-family: var(--font-mono);
      color: var(--accent);
      min-width: 100px;
      flex-shrink: 0;
    }
    .symbol-tag-text {
      font-size: 13px;
      color: var(--text);
    }

    .symbol-deprecated {
      background: #4a2f00;
      border: 1px solid #7a5200;
      border-radius: var(--radius);
      padding: 6px 10px;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .symbol-warning {
      background: #2a1f00;
      border: 1px solid #5a4500;
      border-radius: var(--radius);
      padding: 6px 10px;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .symbol-note {
      background: var(--code-bg);
      border-left: 3px solid var(--accent);
      padding: 6px 10px;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .symbol-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }

    .symbol-srclink {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--font-mono);
    }
    .symbol-srclink a { color: var(--muted); }
    .symbol-srclink a:hover { color: var(--accent); }

    .docs-empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .docs-empty h2 { margin: 0 0 8px; font-weight: 400; }

    /* Responsive */
    @media (max-width: 700px) {
      .docs-sidebar { display: none; }
      .docs-main { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">

      <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>

    </svg>
    Freight

    <input type="search" id="nav-q" placeholder="Search packages…" autocomplete="off">
  </div>
  <div class="nav-links">
    <a href="https://github.com/TiniTinyTerminator/Freight" target="_blank">Docs</a>
    <a href="https://github.com/TiniTinyTerminator/Freight-registry" target="_blank">GitHub</a>

  </div>
  <button class="nav-settings-btn" id="nav-settings" aria-label="Settings" title="Settings">

  </button>
  <button class="nav-hamburger" id="nav-hamburger" aria-label="Menu">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
</nav>

<div class="docs-shell">
  <aside class="docs-sidebar" id="sidebar">
    <div class="docs-sidebar-search">
      <input type="search" id="sym-search" placeholder="Filter symbols…" autocomplete="off">
    </div>
    <div id="sidebar-groups"></div>
  </aside>
  <div class="docs-main" id="main-content">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</div>

<script src="/app.js"></script>
<script>
'use strict';

// Extract package name from /packages/<name>/docs
const pathParts = location.pathname.split('/').filter(Boolean);
const pkgName = pathParts[1] ?? '';
document.title = `${pkgName} docs — Freight Registry`;

// KIND_ORDER defines display grouping and sort priority
const KIND_ORDER = ['fn','sub','macro','struct','class','enum','type','iface','var','mod','item'];
const KIND_LABELS = {
  fn:'Functions', sub:'Subroutines', macro:'Macros',
  struct:'Structs', class:'Classes', enum:'Enums',
  type:'Types', iface:'Interfaces', var:'Variables',
  mod:'Modules', item:'Other',
};

let allItems  = [];
let pkgInfo   = null;
let activeId  = null;

// ── Init ───────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', async () => {
  const mainEl = document.getElementById('main-content');

  try {
    // Fetch package metadata and docs in parallel
    const [pkgResp, docsResp] = await Promise.all([
      API.getPackage(pkgName),
      fetch(`/api/v1/packages/${encodeURIComponent(pkgName)}/${encodeURIComponent('latest')}/docs`),
    ]);

    pkgInfo = pkgResp;

    if (!pkgInfo) {
      mainEl.innerHTML = `<div class="docs-empty"><h2>Package not found</h2></div>`;
      return;
    }

    // Try with latest version if "latest" literal didn't work
    let docsData = null;
    if (docsResp.ok) {
      docsData = await docsResp.json();
    } else if (pkgInfo.latest) {
      const r2 = await fetch(`/api/v1/packages/${encodeURIComponent(pkgName)}/${encodeURIComponent(pkgInfo.latest)}/docs`);
      if (r2.ok) docsData = await r2.json();
    }

    if (!docsData || !docsData.items || docsData.items.length === 0) {
      renderHeader(mainEl, pkgInfo);
      mainEl.innerHTML += `
        <div class="docs-empty" style="padding-top:40px">
          <h2>No API documentation uploaded</h2>
          <p style="font-size:13px">The maintainer hasn't published docs for this package yet.</p>
          <p style="font-size:13px;color:var(--muted)">
            To upload docs: <code style="font-family:var(--font-mono);background:var(--code-bg);padding:2px 6px;border-radius:3px">docify dump --out docs.msgpack && freight publish --docs docs.msgpack</code>
          </p>
        </div>`;
      return;
    }

    allItems = docsData.items;
    renderHeader(mainEl, pkgInfo);
    renderSidebar();

    // Navigate to hash anchor if present
    const hash = location.hash.slice(1);
    const target = hash ? allItems.find(i => slugify(i.name) === hash) : null;
    if (target) {
      showSymbol(target);
    } else {
      renderAllSymbols(mainEl);
    }

  } catch (err) {
    mainEl.innerHTML = `<div class="docs-empty"><h2>Failed to load docs</h2><p>${esc(err.message)}</p></div>`;
  }
});

// ── Sidebar ────────────────────────────────────────────────────────────────

function renderSidebar() {
  const groups = groupByKind(allItems);
  const el = document.getElementById('sidebar-groups');
  el.innerHTML = '';

  for (const kind of KIND_ORDER) {
    const items = groups[kind];
    if (!items || items.length === 0) continue;

    const groupEl = document.createElement('div');
    groupEl.className = 'docs-sidebar-group';
    groupEl.innerHTML = `<div class="docs-sidebar-group-header">${esc(KIND_LABELS[kind] ?? kind)}</div>`;

    for (const item of items) {
      const a = document.createElement('a');
      a.className = 'docs-sidebar-item';
      a.href = `#${slugify(item.name)}`;
      a.dataset.slug = slugify(item.name);
      a.innerHTML = `<span class="docs-sidebar-badge">${esc(item.kind)}</span>${esc(shortName(item.name))}`;
      a.addEventListener('click', e => {
        e.preventDefault();
        history.pushState(null, '', `#${slugify(item.name)}`);
        showSymbol(item);
        setActive(slugify(item.name));
      });
      groupEl.appendChild(a);
    }

    el.appendChild(groupEl);
  }
}

function filterSidebar(query) {
  const q = query.toLowerCase();
  document.querySelectorAll('.docs-sidebar-item').forEach(a => {
    const name = (a.textContent || '').toLowerCase();
    a.style.display = (!q || name.includes(q)) ? '' : 'none';
  });
  document.querySelectorAll('.docs-sidebar-group').forEach(g => {
    const visible = [...g.querySelectorAll('.docs-sidebar-item')].some(a => a.style.display !== 'none');
    g.style.display = visible ? '' : 'none';
  });
}

document.getElementById('sym-search').addEventListener('input', e => {
  filterSidebar(e.target.value);
});

// ── Symbol rendering ───────────────────────────────────────────────────────

function renderHeader(el, pkg) {
  el.innerHTML = `
    <div class="docs-header">
      <h1>${esc(pkg.name)} <span style="color:var(--muted);font-weight:400;font-size:1rem">v${esc(pkg.latest)}</span></h1>
      <div class="docs-header-meta">
        <a href="/packages/${esc(pkg.name)}">← Back to package</a>
        ${pkg.description ? ` · ${esc(pkg.description)}` : ''}
      </div>
    </div>`;
}

function renderAllSymbols(el) {
  const groups = groupByKind(allItems);
  let html = '';
  for (const kind of KIND_ORDER) {
    const items = groups[kind];
    if (!items || items.length === 0) continue;
    html += `<h2 style="margin:32px 0 16px;font-size:1.1rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:.85rem">${esc(KIND_LABELS[kind] ?? kind)}</h2>`;
    for (const item of items) {
      html += renderSymbolHtml(item);
      html += '<hr class="symbol-divider">';
    }
  }
  el.innerHTML += html || '<div class="docs-empty"><h2>No documented symbols</h2></div>';
}

function showSymbol(item) {
  const mainEl = document.getElementById('main-content');
  mainEl.scrollTo({ top: 0, behavior: 'instant' });
  // Keep the header, replace everything after it
  const header = mainEl.querySelector('.docs-header');
  mainEl.innerHTML = header ? header.outerHTML : '';
  mainEl.innerHTML += renderSymbolHtml(item);
  setActive(slugify(item.name));
  activeId = slugify(item.name);
}

function renderSymbolHtml(item) {
  const slug = slugify(item.name);

  // Separate params from other tags
  const params    = item.tags.filter(t => t.kind === 'Param');
  const returns   = item.tags.find(t => t.kind === 'Return');
  const notes     = item.tags.filter(t => t.kind === 'Note');
  const warnings  = item.tags.filter(t => t.kind === 'Warning');
  const deprecated = item.tags.find(t => t.kind === 'Deprecated');
  const sees      = item.tags.filter(t => t.kind === 'See');
  const since     = item.tags.find(t => t.kind === 'Since');
  const examples  = item.tags.filter(t => t.kind === 'Example');
  const others    = item.tags.filter(t =>
    !['Param','Return','Note','Warning','Deprecated','See','Since','Example','Brief'].includes(t.kind)
  );

  let html = `<div class="symbol-detail" id="${esc(slug)}">`;

  // Anchor heading
  html += `<h3 class="symbol-name">
    <span class="docs-sidebar-badge" style="font-size:12px">${esc(item.kind)}</span>
    <a href="#${esc(slug)}" style="color:var(--text);text-decoration:none" onclick="history.pushState(null,'','#${esc(slug)}')">${esc(item.name)}</a>
    <span style="font-size:12px;color:var(--muted)">${esc(item.lang)}</span>
  </h3>`;

  // Deprecated banner
  if (deprecated) {
    html += `<div class="symbol-deprecated">⚠ Deprecated: ${esc(deprecated.text)}</div>`;
  }

  // Signature
  if (item.signature) {
    html += `<div class="symbol-sig">${esc(item.signature)}</div>`;
  }

  // Brief + body
  if (item.brief) {
    html += `<p class="symbol-brief">${esc(item.brief)}</p>`;
  }
  if (item.body) {
    html += `<p class="symbol-body">${esc(item.body)}</p>`;
  }

  // Warnings
  for (const w of warnings) {
    html += `<div class="symbol-warning">⚠ ${esc(w.text)}</div>`;
  }

  // Notes
  for (const n of notes) {
    html += `<div class="symbol-note">${esc(n.text)}</div>`;
  }

  // Parameters
  if (params.length > 0) {
    html += `<div class="symbol-tags"><div class="symbol-tag">
      <div class="symbol-tag-label">Parameters</div>
      <div class="symbol-tag-params">`;
    for (const p of params) {
      html += `<div class="symbol-tag-param">
        <span class="symbol-tag-param-name">${esc(p.name ?? '')}</span>
        <span class="symbol-tag-text">${esc(p.text)}</span>
      </div>`;
    }
    html += `</div></div></div>`;
  }

  // Returns
  if (returns) {
    html += `<div class="symbol-tags"><div class="symbol-tag">
      <div class="symbol-tag-label">Returns</div>
      <div class="symbol-tag-text">${esc(returns.text)}</div>
    </div></div>`;
  }

  // Examples
  if (examples.length > 0) {
    for (const ex of examples) {
      if (ex.text) {
        html += `<div class="symbol-tags"><div class="symbol-tag">
          <div class="symbol-tag-label">Example</div>
          <div class="symbol-sig" style="margin-top:4px">${esc(ex.text)}</div>
        </div></div>`;
      }
    }
  }

  // Other tags
  for (const o of others) {
    html += `<div class="symbol-tags"><div class="symbol-tag">
      <div class="symbol-tag-label">${esc(o.label ?? o.kind)}</div>
      <div class="symbol-tag-text">${esc(o.text)}</div>
    </div></div>`;
  }

  // See also
  if (sees.length > 0) {
    html += `<div class="symbol-tags"><div class="symbol-tag">
      <div class="symbol-tag-label">See also</div>
      <div class="symbol-tag-text">${sees.map(s => {
        const slug2 = slugify(s.text.trim());
        return `<a href="#${esc(slug2)}">${esc(s.text.trim())}</a>`;
      }).join(', ')}</div>
    </div></div>`;
  }

  // Since
  if (since) {
    html += `<div class="symbol-tags"><div class="symbol-tag">
      <div class="symbol-tag-label">Since</div>
      <div class="symbol-tag-text">${esc(since.text)}</div>
    </div></div>`;
  }

  // Source location
  if (item.file) {
    const fname = item.file.split('/').pop() ?? item.file;
    html += `<div class="symbol-srclink" style="margin-top:12px">${esc(fname)}:${item.line}</div>`;
  }

  html += '</div>';
  return html;
}

// ── Helpers ────────────────────────────────────────────────────────────────

function groupByKind(items) {
  const g = {};
  for (const item of items) {
    const k = item.kind ?? 'item';
    (g[k] ??= []).push(item);
  }
  // Sort each group alphabetically by short name
  for (const k of Object.keys(g)) {
    g[k].sort((a, b) => shortName(a.name).localeCompare(shortName(b.name)));
  }
  return g;
}

function shortName(qualified) {
  // "stats::mean" → "mean", "Foo.bar" → "bar"
  const parts = qualified.split(/::|\./);
  return parts[parts.length - 1] ?? qualified;
}

function slugify(name) {
  return name.replace(/[^a-zA-Z0-9_-]/g, '_');
}

function setActive(slug) {
  document.querySelectorAll('.docs-sidebar-item').forEach(a => {
    a.classList.toggle('active', a.dataset.slug === slug);
  });
}
</script>
</body>
</html>
